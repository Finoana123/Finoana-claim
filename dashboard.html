<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }

    #dashboard {
      margin-top: 30px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #3498db;
      color: white;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #2980b9;
    }

    #logoutBtn {
      background-color: #e74c3c;
    }

    #logoutBtn:hover {
      background-color: #c0392b;
    }
  </style>
</head>

<body>

<script>
  // 🔒 Protection (IMPORTANT)
  if (localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "index.html";
  }
</script>

<!-- TON DASHBOARD ORIGINAL -->
<div id="dashboard">
  <h2>Bienvenue dans le Dashboard</h2>

  <button id="autoLoginBtn">Auto-Login</button>
  <button id="predatorBtn">Predator</button>
  <br>
  <button id="logoutBtn">Déconnexion</button>
</div>

<script>
  // Redirections (inchangées)
  document.getElementById("autoLoginBtn").addEventListener("click", function() {
    window.location.href = "autologin.html";
  });

  document.getElementById("predatorBtn").addEventListener("click", function() {
    window.location.href = "copie-mine.html";
  });

  // 🔓 Déconnexion propre
  document.getElementById("logoutBtn").addEventListener("click", function() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "index.html";
  });
</script>

</body>
</html>
