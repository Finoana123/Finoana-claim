<style>
body{ font-family:Arial; text-align:center; margin-top:60px; background:#e6f7ff; }
h1,h2,h3{ color:#333; }
input{ padding:10px; margin:5px; width:220px; border-radius:5px; border:1px solid #ccc; }
button{ padding:12px 25px; margin:10px; border:none; border-radius:5px; font-size:16px; cursor:pointer; transition:0.3s;}
.start{ background:#28a745; color:white; }
.start:hover{ background:#218838; }
.stop{ background:#dc3545; color:white; }
.stop:hover{ background:#c82333; }
.claim{ background:#fd7e14; color:white; }
.claim:hover{ background:#e36a00; }
.logout{ background:gray; color:white; }
.logout:hover{ background:#5a5a5a; }
.footer{ position:fixed; bottom:10px; left:10px; }
.footer a{ color:blue; margin-right:15px; text-decoration:none; font-weight:bold; }
</style>

<body>

<h1>Finoana Dashboard</h1>
<h3 id="welcomeUser"></h3>

<h2>TronPick Account</h2>
<input id="tronUser" placeholder="TronPick Username"><br>
<input id="tronPass" type="password" placeholder="TronPick Password"><br><br>
<button onclick="saveTron()">Sauvegarder le compte</button>

<br><br>
<h2>Auto Claim Bot</h2>
<p id="botStatus">Bot Status : OFF</p>
Next Claim In: 
<input id="timerInput" type="text" value="60:00" style="width:80px;text-align:center;"><br>

<button class="start" onclick="startBot()">Start Auto Claim</button>
<button class="stop" onclick="stopBot()">Stop</button>
<button class="claim" onclick="claimNow()">Claim Now</button>

<br>
<button class="logout" onclick="logout()">Logout</button>

<div class="footer">
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

<script>
let loggedUser = JSON.parse(localStorage.getItem("loggedUser"));
if(!loggedUser){
  window.location.href = "index.html";
} else {
  document.getElementById("welcomeUser").innerText = "Bienvenue " + loggedUser.name;
}

let balance = parseFloat(localStorage.getItem("balance")) || 0;
let timerInterval;
let timeLeft = 3600; // secondes

function saveTron(){
  const tronUser = document.getElementById("tronUser").value.trim();
  const tronPass = document.getElementById("tronPass").value.trim();

  if(!tronUser || !tronPass){
    alert("Veuillez entrer votre compte TronPick");
    return;
  }

  loggedUser.tronUser = tronUser;
  loggedUser.tronPass = tronPass;
  localStorage.setItem("loggedUser", JSON.stringify(loggedUser));
  alert("Compte TronPick sauvegardé");
}

function autoClaim(){
  if(!loggedUser.tronUser || !loggedUser.tronPass){
    alert("Veuillez sauvegarder votre compte TronPick d'abord");
    return;
  }

  balance += 0.01; // simulation claim
  localStorage.setItem("balance", balance);
  alert("Claim effectué ! Solde: " + balance.toFixed(4) + " TRX");
  timeLeft = 3600;
}

function claimNow(){ autoClaim(); }

function startBot(){
  document.getElementById("botStatus").innerText="Bot Status : RUNNING";
  localStorage.setItem("botStatus","running");
  startTimer();
}

function stopBot(){
  document.getElementById("botStatus").innerText="Bot Status : OFF";
  localStorage.setItem("botStatus","off");
  clearInterval(timerInterval);
}

function startTimer(){
  clearInterval(timerInterval);
  const timerValue = document.getElementById("timerInput").value;
  const parts = timerValue.split(":");
  let minutes = parseInt(parts[0]);
  let seconds = parseInt(parts[1]);
  if(isNaN(minutes) || isNaN(seconds)){ alert("Format de timer invalide mm:ss"); return; }
  timeLeft = minutes*60 + seconds;

  timerInterval = setInterval(function(){
    timeLeft--;
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    if(s<10){ s="0"+s; }
    document.getElementById("timerInput").value = m + ":" + s;
    if(timeLeft <= 0){ autoClaim(); }
  },1000);
}

function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href="index.html";
}

// Restaurer statut bot au rechargement
if(localStorage.getItem("botStatus")==="running"){
  document.getElementById("botStatus").innerText="Bot Status : RUNNING";
  startTimer();
}
</script>

</body>
