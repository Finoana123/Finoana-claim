<!DOCTYPE html>
<html>

<head>
<title>Dashboard - Finoana Claim</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;
background:#f2f2f2;
}

input{
padding:10px;
margin:5px;
width:220px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.start{
background:green;
color:white;
}

.stop{
background:red;
color:white;
}

.logout{
background:gray;
color:white;
}

.footer{
position:fixed;
bottom:10px;
left:10px;
}

.footer a{
color:blue;
margin-right:15px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Finoana Dashboard</h1>

<h2>TronPick Account</h2>

<input id="tronUser" placeholder="TronPick Username"><br>
<input id="tronPass" type="password" placeholder="TronPick Password"><br><br>

<button onclick="saveTron()">Save Account</button>

<br><br>

<h2>Auto Claim Bot</h2>

<p id="botStatus">Bot Status : OFF</p>
<p id="timer">Next Claim In : 60:00</p>

<button class="start" onclick="startBot()">Start Auto Claim</button>
<button class="stop" onclick="stopBot()">Stop</button>

<br>

<button class="logout" onclick="logout()">Logout</button>

<div class="footer">
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

<script>

let timeLeft = 3600;
let timerInterval;

/* sauvegarder compte TronPick */
function saveTron(){

let tronUser=document.getElementById("tronUser").value;
let tronPass=document.getElementById("tronPass").value;

if(tronUser=="" || tronPass==""){
alert("Please enter TronPick account");
return;
}

let loggedUser=JSON.parse(localStorage.getItem("loggedUser"));

loggedUser.tronUser=tronUser;
loggedUser.tronPass=tronPass;

localStorage.setItem("loggedUser",JSON.stringify(loggedUser));

alert("TronPick account saved");

}

/* démarrer bot */
function startBot(){

document.getElementById("botStatus").innerText="Bot Status : RUNNING";

localStorage.setItem("botStatus","running");

startTimer();

}

/* arrêter bot */
function stopBot(){

document.getElementById("botStatus").innerText="Bot Status : OFF";

localStorage.setItem("botStatus","off");

clearInterval(timerInterval);

}

/* timer */
function startTimer(){

clearInterval(timerInterval);

timerInterval=setInterval(function(){

timeLeft--;

let minutes=Math.floor(timeLeft/60);
let seconds=timeLeft%60;

if(seconds<10){
seconds="0"+seconds;
}

document.getElementById("timer").innerText=
"Next Claim In : "+minutes+":"+seconds;

if(timeLeft<=0){

alert("Time to claim!");

timeLeft=3600;

}

},1000);

}

/* logout */
function logout(){

localStorage.removeItem("loggedUser");

window.location.href="index.html";

}

/* restaurer statut */
let status=localStorage.getItem("botStatus");

if(status==="running"){
document.getElementById("botStatus").innerText="Bot Status : RUNNING";
startTimer();
}

</script>

</body>
</html>
