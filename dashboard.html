<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: linear-gradient(135deg, #3498db, #2c3e50);
      color: white;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #1abc9c;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #16a085;
      transform: scale(1.05);
    }

    #logoutBtn {
      background-color: #e74c3c;
    }

    #logoutBtn:hover {
      background-color: #c0392b;
    }
  </style>
</head>

<body>

  <h2>Bienvenue dans le Dashboard 👋</h2>

  <button id="autoLoginBtn">Auto-Login</button>
  <button id="predatorBtn">Predator</button>
  <br>
  <button id="logoutBtn">Déconnexion</button>

  <script>
    // 🔒 Vérifier si connecté
    if (localStorage.getItem("isLoggedIn") !== "true") {
      window.location.href = "login.html";
    }

    // 🔓 Déconnexion
    document.getElementById("logoutBtn").addEventListener("click", function() {
      localStorage.removeItem("isLoggedIn");
      window.location.href = "login.html";
    });

    // Redirections
    document.getElementById("autoLoginBtn").addEventListener("click", function() {
      window.location.href = "autologin.html";
    });

    document.getElementById("predatorBtn").addEventListener("click", function() {
      window.location.href = "copie-mine.html";
    });
  </script>

</body>
</html>
