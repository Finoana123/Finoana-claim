<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
      background: linear-gradient(135deg, #3498db, #2c3e50);
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    .container {
      margin-top: 30px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #1abc9c;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #16a085;
      transform: scale(1.05);
    }

    #logoutBtn {
      background-color: #e74c3c;
    }

    #logoutBtn:hover {
      background-color: #c0392b;
    }
  </style>
</head>

<body>

<script>
  // 🔒 Protection page
  if (localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "index.html";
  }
</script>

<h2>Dashboard 🔥</h2>

<div class="container">
  <button onclick="goAuto()">Auto-Login</button>
  <button onclick="goPredator()">Predator</button>
</div>

<br>

<button id="logoutBtn" onclick="logout()">Déconnexion</button>

<script>
  function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "index.html";
  }

  function goAuto() {
    window.location.href = "autologin.html";
  }

  function goPredator() {
    window.location.href = "copie-mine.html";
  }
</script>

</body>
</html>
