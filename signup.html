<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;

}

h1{
color:#333;
}

input{
padding:12px;

padding:12px 25px;

</head>

<body>

<h1>Créer un compte</h1>

<input id="name" type="text" placeholder="Nom"><br>
<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>
<input id="confirmPassword" type="password" placeholder="Confirmer le mot de passe"><br><br>

<button onclick="createAccount()">S'inscrire</button>

<br><br>

<a href="index.html">Retour à la connexion</a>

<div class="footer">
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

<script>

function createAccount(){

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;
const confirmPassword=document.getElementById("confirmPassword").value;

if(!name || !email || !password || !confirmPassword){
alert("Veuillez remplir tous les champs");
return;
}

if(password.length < 6){
alert("Le mot de passe doit contenir au moins 6 caractères");
return;
}

if(password !== confirmPassword){
alert("Les mots de passe ne correspondent pas");
return;
}

auth.createUserWithEmailAndPassword(email,password)

.then((userCredential)=>{

return userCredential.user.updateProfile({
displayName:name
});

})

.then(()=>{

alert("Compte créé avec succès");
window.location.href="index.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
