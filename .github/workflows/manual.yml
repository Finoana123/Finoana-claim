name: Manual Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible (staging ou production)'
        required: true
        default: 'staging'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy
        run: |
          echo "Déploiement vers ${{ inputs.environment }}"
          # Ici tu pourrais appeler ton script de déploiement réel
