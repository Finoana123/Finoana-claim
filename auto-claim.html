<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Finoana Auto Claim</title>

<style>
body { font-family: Arial; background:#f4f9ff; text-align:center; margin-top:40px; }
h1 { color:#333; }
form { background:white; padding:20px; border-radius:8px; width:420px; margin:auto; box-shadow:0 0 10px rgba(0,0,0,0.1); }
input, select { width:90%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; }
label { display:block; text-align:left; margin-left:5%; font-weight:bold; }
button { padding:12px 25px; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
button:hover { background:#218838; }
.hidden { display:none; }
</style>
</head>
<body>

<h1>Finoana Auto Claim - Dashboard</h1>

<form id="claimForm">
  <label>Méthode de connexion</label>
  <select id="method" onchange="toggleMethod()">
    <option value="">-- Choisir une méthode --</option>
    <option value="login">Via Login</option>
    <option value="cookies">Via Cookies</option>
  </select>

  <!-- Champs Login -->
  <div id="loginFields" class="hidden">
    <label>Email</label>
    <input type="email" id="email" placeholder="Votre email">

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Votre mot de passe">

    <label>Bot Timer (minutes)</label>
    <input type="number" id="timer" placeholder="60" min="1">

    <label>Choisir la plateforme</label>
    <select id="platform">
      <option value="">-- Sélectionnez une plateforme --</option>
      <option value="TronPick">TronPick</option>
      <option value="LitePick">LitePick</option>
      <option value="DogePick">DogePick</option>
      <option value="BTCpick">BTCpick</option>
    </select>

    <label>Proxy</label>
    <input type="text" id="proxy" placeholder="http://proxy:port">
  </div>

  <!-- Champs Cookies -->
  <div id="cookieFields" class="hidden">
    <label>Cookie Value</label>
    <input type="text" id="cookieValue" placeholder="Copiez votre cookie ici">
    
    <label>Bot Timer (minutes)</label>
    <input type="number" id="timerCookie" placeholder="60" min="1">

    <label>Choisir la plateforme</label>
    <select id="platformCookie">
      <option value="">-- Sélectionnez une plateforme --</option>
      <option value="TronPick">TronPick</option>
      <option value="LitePick">LitePick</option>
      <option value="DogePick">DogePick</option>
      <option value="BTCpick">BTCpick</option>
    </select>

    <label>Proxy</label>
    <input type="text" id="proxyCookie" placeholder="http://proxy:port">
  </div>

  <button type="button" onclick="saveSettings()">Sauvegarder</button>
</form>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  // ⚠️ Mets ici ta vraie configuration Firebase
  const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "finoana-autoclaim.firebaseapp.com",
    databaseURL: "https://finoana-autoclaim-default-rtdb.firebaseio.com/",
    projectId: "finoana-autoclaim",
    storageBucket: "finoana-autoclaim.appspot.com",
    messagingSenderId: "TON_SENDER_ID",
    appId: "TON_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // Fonction pour afficher les bons champs
  window.toggleMethod = function(){
    const method = document.getElementById("method").value;
    document.getElementById("loginFields").classList.add("hidden");
    document.getElementById("cookieFields").classList.add("hidden");

    if(method === "login"){
      document.getElementById("loginFields").classList.remove("hidden");
    } else if(method === "cookies"){
      document.getElementById("cookieFields").classList.remove("hidden");
    }
  }

  // Sauvegarde dans Firebase
  window.saveSettings = async function(){
    const method = document.getElementById("method").value;
    let settings = { method };

    if(method === "login"){
      settings.email = document.getElementById("email").value;
      settings.password = document.getElementById("password").value;
      settings.timer = document.getElementById("timer").value;
      settings.platform = document.getElementById("platform").value;
      settings.proxy = document.getElementById("proxy").value;
    } else if(method === "cookies"){
      settings.cookieValue = document.getElementById("cookieValue").value;
      settings.timer = document.getElementById("timerCookie").value;
      settings.platform = document.getElementById("platformCookie").value;
      settings.proxy = document.getElementById("proxyCookie").value;
    }

    const user = auth.currentUser;
    if(!user){
      alert("⚠️ Vous devez être connecté !");
      return;
    }

    const userId = user.uid;
    await set(ref(db, "users/" + userId), settings);

    alert("✅ Paramètres sauvegardés dans Firebase !");
  }
</script>

</body>
</html>
