<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Claim - Finoana</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f9ff;
      text-align: center;
      margin: 40px 20px;
    }
    h1 {
      color: #1e2a3a;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #5e6f8c;
      margin-bottom: 25px;
      font-size: 14px;
    }
    form {
      background: white;
      padding: 25px 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: left;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: 600;
      color: #2c3e50;
    }
    input, select {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid #d0d9e8;
      border-radius: 8px;
      font-size: 14px;
      background: #fafbfc;
      transition: 0.2s;
    }
    input:focus, select:focus {
      border-color: #28a745;
      outline: none;
      box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
      background: white;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #218838;
    }
    button:disabled {
      background: #86c78e;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    .info-note {
      background: #eef6ff;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #1e4d7c;
      margin-bottom: 15px;
      border-left: 4px solid #28a745;
    }
    .status-message {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>

<h1>⚙️ Finoana Auto Claim</h1>
<div class="subtitle">Configuration du bot de réclamation automatique</div>

<form id="claimForm">
  <div class="info-note">
    ⚡ <strong>Test :</strong> Pour la méthode Login, utilise <strong>TronPick</strong> (simulation active).<br>
    Les cookies seront sauvegardés dans ton dépôt GitHub privé.
  </div>

  <label for="method">🔐 Méthode de connexion</label>
  <select id="method" onchange="toggleMethod()">
    <option value="">-- Choisir une méthode --</option>
    <option value="login">Via Login (Email + Mot de passe)</option>
    <option value="cookies">Via Cookies (Cookie de session)</option>
  </select>

  <!-- Bloc Login -->
  <div id="loginFields" class="hidden">
    <label for="email">📧 Email</label>
    <input type="email" id="email" placeholder="exemple@mail.com" autocomplete="email">

    <label for="password">🔑 Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="off">

    <label for="timer">⏱️ Timer (minutes)</label>
    <input type="number" id="timer" placeholder="60" min="1" value="60">

    <label for="platform">🎮 Plateforme</label>
    <select id="platform">
      <option value="">-- Sélectionnez --</option>
      <option value="TronPick">TronPick (test simulé)</option>
      <option value="LitePick">LitePick (bientôt)</option>
      <option value="DogePick">DogePick (bientôt)</option>
      <option value="BTCpick">BTCpick (bientôt)</option>
    </select>

    <label for="proxy">🌐 Proxy (optionnel)</label>
    <input type="text" id="proxy" placeholder="http://user:pass@ip:port">
  </div>

  <!-- Bloc Cookies -->
  <div id="cookieFields" class="hidden">
    <label for="cookieValue">🍪 Cookie de session</label>
    <input type="text" id="cookieValue" placeholder="Colle ton cookie ici">

    <label for="timerCookie">⏱️ Timer (minutes)</label>
    <input type="number" id="timerCookie" placeholder="60" min="1" value="60">

    <label for="platformCookie">🎮 Plateforme</label>
    <select id="platformCookie">
      <option value="">-- Sélectionnez --</option>
      <option value="TronPick">TronPick</option>
      <option value="LitePick">LitePick</option>
      <option value="DogePick">DogePick</option>
      <option value="BTCpick">BTCpick</option>
    </select>

    <label for="proxyCookie">🌐 Proxy (optionnel)</label>
    <input type="text" id="proxyCookie" placeholder="http://user:pass@ip:port">
  </div>

  <button type="button" id="saveBtn" onclick="saveSettings()">💾 Sauvegarder la configuration</button>
  <div id="statusMsg" class="status-message"></div>
</form>

<script>
  // ---------- FONCTIONS GLOBALES ----------
  
  // Affiche/masque les champs selon la méthode choisie
  window.toggleMethod = function() {
    const method = document.getElementById('method').value;
    document.getElementById('loginFields').classList.add('hidden');
    document.getElementById('cookieFields').classList.add('hidden');

    if (method === 'login') {
      document.getElementById('loginFields').classList.remove('hidden');
    } else if (method === 'cookies') {
      document.getElementById('cookieFields').classList.remove('hidden');
    }
    // Effacer le message de statut
    document.getElementById('statusMsg').textContent = '';
  };

  // Fonction utilitaire pour afficher des messages temporaires
  function setStatus(message, isError = false) {
    const statusEl = document.getElementById('statusMsg');
    statusEl.textContent = message;
    statusEl.style.color = isError ? '#dc3545' : '#28a745';
  }

  // Fonction principale de sauvegarde
  window.saveSettings = async function() {
    const method = document.getElementById('method').value;
    const saveBtn = document.getElementById('saveBtn');
    const originalText = saveBtn.textContent;
    
    // Réinitialiser le message
    setStatus('');

    // Récupération des champs communs et spécifiques
    let platform, timer, proxy, cookie = null;
    let email = null, password = null;

    if (method === 'login') {
      email = document.getElementById('email').value.trim();
      password = document.getElementById('password').value;
      timer = document.getElementById('timer').value;
      platform = document.getElementById('platform').value;
      proxy = document.getElementById('proxy').value.trim();
    } else if (method === 'cookies') {
      cookie = document.getElementById('cookieValue').value.trim();
      timer = document.getElementById('timerCookie').value;
      platform = document.getElementById('platformCookie').value;
      proxy = document.getElementById('proxyCookie').value.trim();
    } else {
      alert('❌ Veuillez choisir une méthode de connexion.');
      return;
    }

    // Vérifications
    if (!platform) {
      alert('❌ Veuillez sélectionner une plateforme.');
      return;
    }

    // --- IDENTIFIANT UTILISATEUR (stocké localement) ---
    let userId = localStorage.getItem('finoana_user_id');
    if (!userId) {
      userId = 'user_' + Math.random().toString(36).substring(2, 12);
      localStorage.setItem('finoana_user_id', userId);
    }

    // --- GESTION DU COOKIE ---
    let finalCookie = null;

    try {
      if (method === 'cookies') {
        if (!cookie) {
          alert('❌ Veuillez entrer un cookie.');
          return;
        }
        finalCookie = cookie;
        setStatus('🍪 Cookie manuel prêt pour la sauvegarde...');
      } 
      else if (method === 'login') {
        // Vérifier les champs login
        if (!email || !password) {
          alert('❌ Veuillez saisir email et mot de passe.');
          return;
        }

        // Désactiver le bouton et afficher le chargement
        saveBtn.disabled = true;
        saveBtn.textContent = '🔄 Authentification en cours...';
        setStatus(`Connexion à ${platform} avec ${email}...`);

        // Appel à l'API autologin
        const loginResponse = await fetch('/api/autologin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            password: password,
            platform: platform,
            proxy: proxy || null
          })
        });

        const loginData = await loginResponse.json();
        if (!loginResponse.ok) {
          throw new Error(loginData.error || 'Échec de l\'authentification');
        }

        finalCookie = loginData.cookie;
        if (!finalCookie) {
          throw new Error('Aucun cookie reçu du serveur');
        }
        
        setStatus('✅ Authentification réussie, cookie récupéré. Sauvegarde en cours...');
      }

      // --- SAUVEGARDE VIA L'API GITHUB ---
      const saveResponse = await fetch('/api/save-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: userId,
          platform: platform,
          cookie: finalCookie,
          proxy: proxy || null,
          timer: parseInt(timer) || 60
        })
      });

      const saveData = await saveResponse.json();
      if (!saveResponse.ok) {
        throw new Error(saveData.error || 'Erreur lors de la sauvegarde');
      }

      // Succès complet
      setStatus(`🎉 Configuration sauvegardée ! Fichier : configs/${userId}.json`);
      alert(`✅ Configuration sauvegardée avec succès !\n📁 Fichier : configs/${userId}.json`);

    } catch (error) {
      console.error('Erreur:', error);
      setStatus(`❌ ${error.message}`, true);
      alert('❌ Erreur : ' + error.message);
    } finally {
      // Réactiver le bouton
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
  };
</script>

</body>
</html>
