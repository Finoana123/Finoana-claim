<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Claim - Finoana</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f9ff;
      text-align: center;
      margin: 40px 20px;
    }
    h1 { color: #1e2a3a; margin-bottom: 10px; }
    h3 { color: #1e2a3a; margin: 20px 0 10px; }
    .subtitle { color: #5e6f8c; margin-bottom: 25px; font-size: 14px; }
    form, .test-block {
      background: white;
      padding: 25px 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: left;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: 600;
      color: #2c3e50;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d0d9e8;
      border-radius: 8px;
      font-size: 14px;
      background: #fafbfc;
      transition: 0.2s;
    }
    input:focus, select:focus {
      border-color: #28a745;
      outline: none;
      box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
      background: white;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #218838; }
    button:disabled { background: #86c78e; cursor: not-allowed; }
    .btn-blue {
      background: #007bff;
    }
    .btn-blue:hover {
      background: #0069d9;
    }
    .hidden { display: none; }
    .info-note {
      background: #eef6ff;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #1e4d7c;
      margin-bottom: 15px;
      border-left: 4px solid #28a745;
    }
    .status-message {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }
    hr {
      margin: 30px 0 10px;
      border: none;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>

<h1>⚙️ Finoana Auto Claim</h1>
<div class="subtitle">Configuration du bot de réclamation automatique</div>

<!-- Formulaire principal (Login / Cookies) -->
<form id="claimForm">
  <div class="info-note">
    ⚡ <strong>Login + Claim immédiat :</strong> après connexion, le claim est tenté automatiquement.<br>
    Le cookie est sauvegardé dans ton dépôt GitHub privé.
  </div>

  <label for="method">🔐 Méthode de connexion</label>
  <select id="method" onchange="toggleMethod()">
    <option value="">-- Choisir une méthode --</option>
    <option value="login">Via Login (Email + Mot de passe)</option>
    <option value="cookies">Via Cookies (Cookie de session)</option>
  </select>

  <!-- Bloc Login -->
  <div id="loginFields" class="hidden">
    <label for="email">📧 Email</label>
    <input type="email" id="email" placeholder="exemple@mail.com" autocomplete="email">

    <label for="password">🔑 Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="off">

    <label for="timer">⏱️ Timer (minutes)</label>
    <input type="number" id="timer" placeholder="60" min="1" value="60">

    <label for="platform">🎮 Plateforme</label>
    <select id="platform">
      <option value="">-- Sélectionnez --</option>
      <option value="TronPick">TronPick</option>
      <option value="LitePick">LitePick (bientôt)</option>
      <option value="DogePick">DogePick (bientôt)</option>
      <option value="BTCpick">BTCpick (bientôt)</option>
    </select>

    <label for="proxy">🌐 Proxy (optionnel)</label>
    <input type="text" id="proxy" placeholder="http://user:pass@ip:port">
  </div>

  <!-- Bloc Cookies -->
  <div id="cookieFields" class="hidden">
    <label for="cookieValue">🍪 Cookie de session</label>
    <input type="text" id="cookieValue" placeholder="Colle ton cookie ici">

    <label for="timerCookie">⏱️ Timer (minutes)</label>
    <input type="number" id="timerCookie" placeholder="60" min="1" value="60">

    <label for="platformCookie">🎮 Plateforme</label>
    <select id="platformCookie">
      <option value="">-- Sélectionnez --</option>
      <option value="TronPick">TronPick</option>
      <option value="LitePick">LitePick</option>
      <option value="DogePick">DogePick</option>
      <option value="BTCpick">BTCpick</option>
    </select>

    <label for="proxyCookie">🌐 Proxy (optionnel)</label>
    <input type="text" id="proxyCookie" placeholder="http://user:pass@ip:port">
  </div>

  <button type="button" id="saveBtn" onclick="saveSettings()">💾 Sauvegarder la configuration</button>
  <div id="statusMsg" class="status-message"></div>
</form>

<!-- Bloc de test manuel du Claim -->
<hr>
<h3>🧪 Test Manuel du Claim</h3>
<div class="test-block">
  <label for="testUserId">User ID (ex: user_g5ro565mil)</label>
  <input type="text" id="testUserId" value="" placeholder="user_...">

  <label for="testProxy">Proxy (optionnel, recommandé)</label>
  <input type="text" id="testProxy" placeholder="http://user:pass@ip:port">

  <button onclick="testClaim()" class="btn-blue">🚀 Lancer le claim</button>
  <div id="testResult" class="status-message"></div>
</div>

<script>
  // ----- Initialisation : userId -----
  function getUserId() {
    let uid = localStorage.getItem('finoana_user_id');
    if (!uid) {
      uid = 'user_' + Math.random().toString(36).substring(2, 12);
      localStorage.setItem('finoana_user_id', uid);
    }
    return uid;
  }

  // Afficher l'ID utilisateur dans le champ de test
  document.getElementById('testUserId').value = getUserId();

  // ----- UI : afficher/masquer les champs -----
  window.toggleMethod = function() {
    const method = document.getElementById('method').value;
    document.getElementById('loginFields').classList.add('hidden');
    document.getElementById('cookieFields').classList.add('hidden');
    if (method === 'login') {
      document.getElementById('loginFields').classList.remove('hidden');
    } else if (method === 'cookies') {
      document.getElementById('cookieFields').classList.remove('hidden');
    }
    document.getElementById('statusMsg').textContent = '';
  };

  function setStatus(msg, isError = false) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.style.color = isError ? '#dc3545' : '#28a745';
  }

  // ----- Sauvegarde (Login / Cookies) -----
  window.saveSettings = async function() {
    const method = document.getElementById('method').value;
    const saveBtn = document.getElementById('saveBtn');
    const originalText = saveBtn.textContent;
    setStatus('');

    let platform, timer, proxy, cookie = null;
    let email = null, password = null;

    if (method === 'login') {
      email = document.getElementById('email').value.trim();
      password = document.getElementById('password').value;
      timer = document.getElementById('timer').value;
      platform = document.getElementById('platform').value;
      proxy = document.getElementById('proxy').value.trim();
    } else if (method === 'cookies') {
      cookie = document.getElementById('cookieValue').value.trim();
      timer = document.getElementById('timerCookie').value;
      platform = document.getElementById('platformCookie').value;
      proxy = document.getElementById('proxyCookie').value.trim();
    } else {
      alert('❌ Veuillez choisir une méthode de connexion.');
      return;
    }

    if (!platform) {
      alert('❌ Veuillez sélectionner une plateforme.');
      return;
    }

    const userId = getUserId();
    let finalCookie = null;

    try {
      if (method === 'cookies') {
        if (!cookie) throw new Error('Cookie manquant');
        finalCookie = cookie;
        setStatus('🍪 Cookie manuel prêt pour la sauvegarde...');
      } else {
        if (!email || !password) throw new Error('Email et mot de passe requis');

        saveBtn.disabled = true;
        saveBtn.textContent = '🔄 Authentification en cours...';
        setStatus(`Connexion à ${platform} avec ${email}...`);

        const loginResp = await fetch('/api/autologin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, platform, proxy: proxy || null, userId })
        });

        const loginData = await loginResp.json();
        if (!loginResp.ok) throw new Error(loginData.error || 'Échec authentification');

        finalCookie = loginData.cookie;
        setStatus('✅ Login OK, cookie récupéré.');
      }

      // Sauvegarde GitHub
      setStatus('💾 Sauvegarde dans GitHub...');
      const saveResp = await fetch('/api/save-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId, platform,
          cookie: finalCookie,
          proxy: proxy || null,
          timer: parseInt(timer) || 60
        })
      });

      const saveData = await saveResp.json();
      if (!saveResp.ok) throw new Error(saveData.error || 'Erreur sauvegarde');

      alert(`✅ Config sauvegardée (configs/${userId}.json)`);
      setStatus(`✅ Config sauvegardée.`);

    } catch (err) {
      console.error(err);
      setStatus(`❌ ${err.message}`, true);
      alert('❌ Erreur : ' + err.message);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
  };

  // ----- Test manuel du Claim -----
  window.testClaim = async function() {
    const userId = document.getElementById('testUserId').value.trim();
    const proxy = document.getElementById('testProxy').value.trim();
    const resultEl = document.getElementById('testResult');

    if (!userId) {
      resultEl.textContent = '❌ User ID requis';
      return;
    }

    resultEl.textContent = '⏳ Claim en cours...';
    resultEl.style.color = '#000';

    try {
      const res = await fetch('/api/claim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, proxy: proxy || null })
      });

      const data = await res.json();
      if (res.ok) {
        if (data.success) {
          resultEl.textContent = `✅ Claim réussi ! ${data.message}`;
          resultEl.style.color = '#28a745';
        } else {
          resultEl.textContent = `⚠️ Claim échoué : ${data.message}`;
          resultEl.style.color = '#ff9800';
        }
      } else {
        resultEl.textContent = `❌ Erreur API : ${data.error}`;
        resultEl.style.color = '#dc3545';
      }
    } catch (e) {
      resultEl.textContent = `❌ Erreur réseau : ${e.message}`;
      resultEl.style.color = '#dc3545';
    }
  };
</script>
</body>
</html>
