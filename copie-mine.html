<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Copie Mine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: linear-gradient(135deg, #8e44ad, #2c3e50);
      color: white;
    }
    h2 { margin-bottom: 20px; }
    button {
      padding: 12px 25px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #1abc9c;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }
    button:hover {
      background-color: #16a085;
      transform: scale(1.05);
    }
    #logoutBtn {
      background-color: #e74c3c;
    }
    #logoutBtn:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

  <h2>Page Copie Mine</h2>
  <p>Contenu réservé aux utilisateurs connectés</p>

  <div id="content">
    <p>Ici se trouve le contenu de la page Copie Mine.</p>
  </div>

  <button id="logoutBtn">Déconnexion</button>

  <script>
    // Vérifier immédiatement si l'utilisateur est connecté
    const loggedUser = localStorage.getItem("loggedUser");
    if (!loggedUser) {
      window.location.href = "index.html";
    }

    // Déconnexion
    document.getElementById("logoutBtn").addEventListener("click", function() {
      localStorage.removeItem("loggedUser");
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
