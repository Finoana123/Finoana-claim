<!DOCTYPE html>
<html>

<head>
<title>Finoana Claim</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#f2f2f2;
}

input{
padding:10px;
margin:5px;
width:220px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.login{
background:green;
color:white;
}

.signup{
background:orange;
color:white;
}

.footer{
position:fixed;
bottom:10px;
left:10px;
}

.footer a{
color:blue;
margin-right:15px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Finoana Auto Claim</h1>

<input id="email" placeholder="Email">

<br>

<input id="password" type="password" placeholder="Password">

<br><br>

<button class="login" onclick="login()">Login</button>

<button class="signup" onclick="window.location.href='signup.html'">Sign up</button>

<div class="footer">
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

<script>
function login(){

let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value;

let users=JSON.parse(localStorage.getItem("users")) || [];

let foundUser=null;

for(let i=0;i<users.length;i++){

if(users[i].email===email && users[i].password===password){
foundUser=users[i];
break;
}

}

if(foundUser){

/* créer session */
localStorage.setItem("loggedUser",JSON.stringify(foundUser));

window.location.href="dashboard.html";

}else{

alert("Invalid email or password");

}

}



function signup(){
alert("Sign up page coming soon");
}

</script>

</body>

</html>
