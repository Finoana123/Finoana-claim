<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finoana Auto Claim - Connexion</title>

<!-- Firebase v10 moderne -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAuuM8srnQNvYHJG5vMFfJQq-MwpU2H0Po",
  authDomain: "finoana-autoclaim.firebaseapp.com",
  projectId: "finoana-autoclaim",
  storageBucket: "finoana-autoclaim.firebasestorage.app",
  messagingSenderId: "873516238295",
  appId: "1:873516238295:web:ab78797587d0f300173792"
};

// Initialiser Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.login = async function() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Veuillez entrer votre email et mot de passe.");
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    // Récupérer nom depuis Realtime Database
    const snapshot = await get(ref(db, "users/" + uid));
    if(snapshot.exists()){
      const userData = snapshot.val();
      localStorage.setItem("loggedUser", JSON.stringify(userData));
      window.location.href = "dashboard.html";
    } else {
      alert("Utilisateur non trouvé dans la base de données.");
    }
  } catch(error){
    alert(error.message);
  }
};
</script>

<style>
body{ font-family:Arial; text-align:center; margin-top:80px; background:#e6f7ff;}
h1{ color:#333; }
input{ padding:12px; margin:10px; width:260px; border-radius:5px; border:1px solid #ccc;}
button{ padding:12px 25px; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;}
button:hover{ background:#218838; }
a{text-decoration:none; color:#007bff; font-weight:bold;}
.footer{ position:fixed; bottom:10px; left:10px;}
.footer a{ margin-right:15px; }
</style>

</head>
<body>

<h1>Finoana Auto Claim</h1>
<p>Connectez-vous pour commencer à gagner vos TRX.</p>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Login</button>
<button onclick="window.location.href='signup.html'">Sign up</button>

<div class="footer">
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

</body>
</html>
