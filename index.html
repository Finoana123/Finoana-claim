<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 - Cotes Virtuelles</title>
  <style>
    body { font-family: sans-serif; max-width: 450px; margin: 2rem auto; padding: 1rem; }
    label { display: block; margin-top: 1rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.2rem; font-size: 1rem; }
    button { width: 100%; padding: 0.7rem; margin-top: 1.5rem; background: #0070f3; color: white;
             border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    #result { margin-top: 1.5rem; background: #f2f2f2; padding: 1rem; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Bet261 - Connexion + Cotes</h1>
  <form id="loginForm">
    <label>Téléphone :</label>
    <input type="tel" id="phone" name="phone" placeholder="0612345678" required>
    <label>Mot de passe :</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">Se connecter et voir les cotes</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value.trim();
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = '⏳ Connexion en cours...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });
        const data = await res.json();
        if (data.error) {
          resultDiv.textContent = '❌ ' + data.error;
        } else {
          resultDiv.innerHTML = `
            <p>✅ Connexion réussie</p>
            <p><strong>1 :</strong> ${data.odds.home}</p>
            <p><strong>N :</strong> ${data.odds.draw}</p>
            <p><strong>2 :</strong> ${data.odds.away}</p>
            <p><em>${data.message || ''}</em></p>
          `;
        }
      } catch (err) {
        resultDiv.textContent = '❌ Erreur réseau : ' + err.message;
      }
    });
  </script>
</body>
</html>
