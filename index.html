<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – OCR Debug</title>
  <style>
    :root {
      --primary: #1a73e8;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --border: #dadce0;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      margin: 0; padding: 2rem 1rem;
      display: flex; justify-content: center;
      color: var(--text);
    }
    .container { max-width: 900px; width: 100%; }
    .header { text-align: center; margin-bottom: 2rem; }
    .btn {
      display: inline-block; padding: 0.6rem 1.5rem;
      background: var(--primary); color: white; border: none;
      border-radius: 6px; font-size: 1rem; cursor: pointer;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin: 0.5rem 0; }
    img.preview { max-width: 200px; border: 1px solid #ccc; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>OCR Debug – Étape 1 : image prétraitée</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button id="debugBtn" class="btn">Tester le prétraitement</button>
    <div id="previewContainer"></div>
    <div id="ocrResult" class="debug"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const debugBtn = document.getElementById('debugBtn');
    const previewContainer = document.getElementById('previewContainer');
    const ocrResult = document.getElementById('ocrResult');

    debugBtn.addEventListener('click', async () => {
      if (!fileInput.files[0]) return;
      const file = fileInput.files[0];

      // Afficher l'image originale
      previewContainer.innerHTML = '<p>Image originale :</p><img class="preview" src="' + URL.createObjectURL(file) + '">';

      // Prétraiter
      const processedBlob = await preprocessImage(file);
      const processedUrl = URL.createObjectURL(processedBlob);
      previewContainer.innerHTML += '<p>Image prétraitée (noir & blanc) :</p><img class="preview" src="' + processedUrl + '">';

      // Envoyer l'image prétraitée à l'API
      ocrResult.textContent = 'Envoi à l\'API OCR...';
      try {
        const text = await uploadAndOCR(processedBlob);
        ocrResult.textContent = 'Texte extrait (prétraité) :\n' + (text || '(vide)');
      } catch (e) {
        ocrResult.textContent = 'Erreur : ' + e.message;
      }
    });

    function preprocessImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width * 2;
          canvas.height = img.height * 2;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            const val = gray > 128 ? 255 : 0;
            data[i] = val;
            data[i+1] = val;
            data[i+2] = val;
          }
          ctx.putImageData(imageData, 0, 0);
          canvas.toBlob(resolve, 'image/png');
        };
        img.src = URL.createObjectURL(file);
      });
    }

    async function uploadAndOCR(blob) {
      const form = new FormData();
      form.append('image', blob, 'image.png');
      const res = await fetch('/api/ocr', { method: 'POST', body: form });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.text || '';
    }
  </script>
</body>
</html>
