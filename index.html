<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Cotes (30 valeurs après parasites)</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.8rem 1.5rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; display: none; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <h1>⚽ Bet261 – Cotes (corrigé parasites)</h1>
  <p>Chargez la capture des <strong>cotes</strong> (avant match).</p>
  <input type="file" id="cotesInput" accept="image/*" />
  <p>Clé API OCR.space</p>
  <input type="text" id="apiKey" placeholder="Votre clé API" style="width:100%; padding:0.5rem; margin-bottom:1rem;" />
  <button id="analyzeBtn">Analyser les cotes</button>
  <div id="debugArea" style="display:none;">
    <h3>Texte brut cotes</h3>
    <div id="cotesDebug" class="debug"></div>
    <h3>Nombres extraits</h3>
    <div id="numbersDebug" class="debug"></div>
  </div>
  <table id="resultTable">
    <thead>
      <tr>
        <th>Équipe 1</th><th>Équipe 2</th>
        <th>1</th><th>N</th><th>2</th>
        <th>S 1+2</th><th>S 1+N+2</th><th>Moy</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">📋 Copier</button>
    <button id="csvBtn">📥 CSV</button>
  </div>

  <script>
    // Liste officielle des clubs (20 noms → 10 paires)
    const OFFICIAL_CLUBS = [
      "Manchester Red", "Everton",
      "Leeds", "London Blues",
      "Burnley", "Fulham",
      "Brentford", "West Ham",
      "Newcastle", "Sunderland",
      "Liverpool", "Brighton",
      "Spurs", "A. Villa",
      "N. Forest", "Wolverhampton",
      "Manchester Blue", "Bournemouth",
      "C. Palace", "London Reds"
    ];

    const cotesInput = document.getElementById('cotesInput');
    const apiKeyInput = document.getElementById('apiKey');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const debugArea = document.getElementById('debugArea');
    const cotesDebug = document.getElementById('cotesDebug');
    const numbersDebug = document.getElementById('numbersDebug');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    const actionsDiv = document.getElementById('actions');

    async function ocrSpace(file, apiKey) {
      const form = new FormData();
      form.append('apikey', apiKey);
      form.append('file', file, 'image.png');
      form.append('language', 'fre');
      form.append('OCREngine', 2);
      const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: form });
      const data = await res.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage || 'Erreur OCR');
      return data.ParsedResults?.[0]?.ParsedText || '';
    }

    function extractOddsFromColumns(text) {
      // Extraire tous les nombres décimaux dans l'ordre d'apparition
      const allNumbers = [];
      const regex = /\d+[.,]\d+/g;
      let match;
      while ((match = regex.exec(text)) !== null) {
        allNumbers.push(match[0].replace(',', '.'));
      }

      numbersDebug.textContent = `Total nombres extraits : ${allNumbers.length}\n` + allNumbers.join('\n');

      // Ignorer les 6 premiers nombres parasites (coordonnées d'affichage)
      const startIndex = 6;
      const relevant = allNumbers.slice(startIndex, startIndex + 30);
      
      if (relevant.length < 30) {
        console.warn('Nombre insuffisant de cotes : ' + relevant.length);
        return [];
      }

      // Diviser en 3 colonnes de 10
      const col1 = relevant.slice(0, 10);   // cotes "1"
      const colN = relevant.slice(10, 20);  // cotes "N"
      const col2 = relevant.slice(20, 30);  // cotes "2"

      // Paires d'équipes (2 par 2)
      const pairs = [];
      for (let i = 0; i < OFFICIAL_CLUBS.length; i += 2) {
        pairs.push({
          team1: OFFICIAL_CLUBS[i],
          team2: OFFICIAL_CLUBS[i + 1]
        });
      }

      // Assembler les matchs
      const matches = [];
      for (let i = 0; i < pairs.length; i++) {
        matches.push({
          team1: pairs[i].team1,
          team2: pairs[i].team2,
          homeOdd: col1[i],
          drawOdd: colN[i],
          awayOdd: col2[i]
        });
      }
      return matches;
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!cotesInput.files[0]) return alert('Choisissez l\'image des cotes');
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return alert('Entrez votre clé API OCR.space');

      analyzeBtn.disabled = true;
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
      actionsDiv.style.display = 'none';

      try {
        const cotesText = await ocrSpace(cotesInput.files[0], apiKey);
        cotesDebug.textContent = cotesText || '(vide)';
        debugArea.style.display = 'block';

        const matches = extractOddsFromColumns(cotesText);

        tbody.innerHTML = '';
        matches.forEach(m => {
          const h = parseFloat(m.homeOdd);
          const d = parseFloat(m.drawOdd);
          const a = parseFloat(m.awayOdd);
          let sum12 = '–', sum1N2 = '–', moy = '–';
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            sum12 = (h + a).toFixed(2);
            sum1N2 = (h + d + a).toFixed(2);
            moy = ((h + d + a) / 3).toFixed(2);
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td>
            <td>${m.homeOdd}</td><td>${m.drawOdd}</td><td>${m.awayOdd}</td>
            <td>${sum12}</td><td>${sum1N2}</td><td>${moy}</td>`;
          tbody.appendChild(tr);
        });
        resultTable.style.display = 'table';
        actionsDiv.style.display = 'flex';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    document.getElementById('copyBtn').onclick = () => {
      const rows = [...tbody.querySelectorAll('tr')];
      const text = rows.map(r => [...r.querySelectorAll('td')].map(d => d.textContent).join('\t')).join('\n');
      navigator.clipboard.writeText(text).then(() => alert('Copié !'));
    };
    document.getElementById('csvBtn').onclick = () => {
      let csv = 'Équipe 1,Équipe 2,1,N,2,Somme 1+2,Somme 1+N+2,Moyenne\n';
      [...tbody.querySelectorAll('tr')].forEach(r => {
        const tds = [...r.querySelectorAll('td')].map(d => d.textContent);
        csv += tds.map(v => `"${v}"`).join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cotes.csv';
      a.click();
    };
  </script>
</body>
</html>
