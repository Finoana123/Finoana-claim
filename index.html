<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Fusion robuste</title>
  <style>
    :root {
      --primary: #1a73e8;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --border: #dadce0;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      margin: 0; padding: 2rem 1rem;
      display: flex; justify-content: center;
      color: var(--text);
    }
    .container { max-width: 900px; width: 100%; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-weight: 400; font-size: 2rem; margin: 0 0 0.5rem; }
    .header p { color: #5f6368; }
    .upload-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .upload-card {
      flex: 1 1 250px; background: var(--card-bg);
      border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .upload-area {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 1.5rem; text-align: center; cursor: pointer;
    }
    .upload-area:hover { border-color: var(--primary); background: #f1f5ff; }
    .upload-area input { display: none; }
    .btn {
      display: inline-block; padding: 0.6rem 1.5rem;
      background: var(--primary); color: white; border: none;
      border-radius: 6px; font-size: 1rem; cursor: pointer;
      margin-top: 1rem; transition: 0.2s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      background: white; color: var(--primary); border: 1px solid var(--primary);
    }
    .result-card {
      background: var(--card-bg); border-radius: 12px;
      padding: 1.5rem; margin-top: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: none;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.3rem; border-bottom: 1px solid var(--border); }
    th { font-weight: 500; color: #5f6368; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
    .debug { background: #f4f4f4; padding: 1rem; margin-top: 1rem; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    .error { color: #d93025; background: #fce8e6; padding: 1rem; border-radius: 8px; }
    .spinner {
      display: inline-block; width: 1rem; height: 1rem;
      border: 2px solid #ccc; border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ Bet261 – Fusion robuste</h1>
      <p>Sélectionnez les deux captures. Résultats puis cotes.</p>
    </div>

    <div class="upload-row">
      <div class="upload-card">
        <h3>1. Capture des résultats</h3>
        <div class="upload-area" id="resultsArea">
          <p>📷 Image des scores après matchs</p>
          <input type="file" id="resultsInput" accept="image/*">
        </div>
      </div>
      <div class="upload-card">
        <h3>2. Capture des cotes</h3>
        <div class="upload-area" id="oddsArea">
          <p>📷 Matchs avec cotes</p>
          <input type="file" id="oddsInput" accept="image/*">
        </div>
      </div>
    </div>

    <button class="btn" id="analyzeBtn" disabled>Analyser et fusionner</button>
    <div id="status"></div>

    <div id="debugArea" style="display:none;">
      <h3>OCR brut – Résultats</h3>
      <div id="resultsDebug" class="debug"></div>
      <h3>OCR brut – Cotes</h3>
      <div id="oddsDebug" class="debug"></div>
    </div>

    <div class="result-card" id="resultCard">
      <h2>Tableau complet</h2>
      <div style="overflow-x: auto;">
        <table id="matchTable">
          <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th><th>Résultat</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="actions">
        <button class="btn btn-outline" id="copyBtn">📋 Copier</button>
        <button class="btn btn-outline" id="csvBtn">📥 CSV</button>
      </div>
    </div>
  </div>


  <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>

<script>
const oddsInput = document.getElementById('oddsInput');
const resultsInput = document.getElementById('resultsInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const tbody = document.querySelector('#matchTable tbody');
const resultCard = document.getElementById('resultCard');
const statusDiv = document.getElementById('status');

let oddsFile = null, resultsFile = null;

oddsInput.onchange = () => { oddsFile = oddsInput.files[0]; check(); };
resultsInput.onchange = () => { resultsFile = resultsInput.files[0]; check(); };

function check() {
  analyzeBtn.disabled = !(oddsFile && resultsFile);
}

function normalize(s) {
  return s.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]/g, '');
}

function isOdd(text) {
  return /^\d+[.,]\d+$/.test(text);
}

function isScore(text) {
  return /^\d+[-:]\d+$/.test(text);
}

function clean(text) {
  return text.replace(/[^A-Za-zÀ-ÖØ-öø-ÿ0-9 .'-]/g, '').trim();
}

async function ocrWithBoxes(file) {
  const res = await Tesseract.recognize(file, 'eng', {
    logger: m => console.log(m)
  });

  return res.data.words.map(w => ({
    text: w.text,
    x: w.bbox.x0,
    y: w.bbox.y0
  }));
}

function groupLines(words) {
  const lines = [];

  words.forEach(w => {
    let line = lines.find(l => Math.abs(l.y - w.y) < 10);
    if (!line) {
      line = { y: w.y, words: [] };
      lines.push(line);
    }
    line.words.push(w);
  });

  return lines.map(l =>
    l.words.sort((a,b)=>a.x-b.x).map(w=>w.text)
  );
}

function extractMatchesFromOdds(lines) {
  const matches = [];

  for (let i = 0; i < lines.length; i++) {
    const words = lines[i];

    const odds = words.filter(isOdd);

    if (odds.length >= 2) {

      // chercher équipes autour
      let team1 = '';
      let team2 = '';

      if (lines[i-1]) {
        team1 = clean(lines[i-1].join(' '));
      }
      if (lines[i+1]) {
        team2 = clean(lines[i+1].join(' '));
      }

      if (team1 && team2) {
        matches.push({
          team1,
          team2,
          homeOdd: odds[0] || null,
          drawOdd: odds[1] || null,
          awayOdd: odds[2] || null
        });
      }
    }
  }

  return matches;
}

function extractResults(lines) {
  const results = {};

  for (const words of lines) {
    const line = words.join(' ');

    const match = line.match(/(.+?)\s*(\d+)[-:](\d+)\s*(.+)/);

    if (match) {
      const team1 = clean(match[1]);
      const team2 = clean(match[4]);
      const score = `${match[2]}-${match[3]}`;

      results[normalize(team1)] = score;
      results[normalize(team2)] = score;
    }
  }

  return results;
}

function findResult(team, results) {
  const key = normalize(team);

  if (results[key]) return results[key];

  for (const k in results) {
    if (k.includes(key) || key.includes(k)) {
      return results[k];
    }
  }

  return null;
}

analyzeBtn.onclick = async () => {
  analyzeBtn.disabled = true;
  statusDiv.innerText = "🔍 Analyse intelligente en cours...";

  try {
    const [oddsWords, resultsWords] = await Promise.all([
      ocrWithBoxes(oddsFile),
      ocrWithBoxes(resultsFile)
    ]);

    const oddsLines = groupLines(oddsWords);
    const resultsLines = groupLines(resultsWords);

    const matches = extractMatchesFromOdds(oddsLines);
    const results = extractResults(resultsLines);

    matches.forEach(m => {
      m.result =
        findResult(m.team1, results) ||
        findResult(m.team2, results) ||
        '-';

      const h = parseFloat(m.homeOdd);
      const d = parseFloat(m.drawOdd);
      const a = parseFloat(m.awayOdd);

      m.sum12 = (!isNaN(h) && !isNaN(a)) ? (h+a).toFixed(2) : '-';
      m.sumAll = (!isNaN(h) && !isNaN(d) && !isNaN(a)) ? (h+d+a).toFixed(2) : '-';
      m.mean = (!isNaN(h) && !isNaN(d) && !isNaN(a)) ? ((h+d+a)/3).toFixed(2) : '-';
    });

    render(matches);

  } catch (e) {
    statusDiv.innerText = "❌ Erreur OCR";
  }

  analyzeBtn.disabled = false;
};

function render(matches) {
  tbody.innerHTML = '';

  matches.forEach(m => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${m.team1}</td>
      <td>${m.team2}</td>
      <td>${m.homeOdd||'-'}</td>
      <td>${m.drawOdd||'-'}</td>
      <td>${m.awayOdd||'-'}</td>
      <td>${m.sum12}</td>
      <td>${m.sumAll}</td>
      <td>${m.mean}</td>
      <td>${m.result}</td>
    `;

    tbody.appendChild(tr);
  });

  resultCard.style.display = 'block';
}
    </script>
