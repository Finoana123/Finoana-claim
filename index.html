<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Cotes (avec coordonnées)</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.8rem 1.5rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; display: none; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <h1>⚽ Bet261 – Cotes (coordonnées)</h1>
  <p>Chargez la capture des <strong>cotes</strong> (avant match).</p>
  <input type="file" id="cotesInput" accept="image/*" />
  <p>Clé API OCR.space</p>
  <input type="text" id="apiKey" placeholder="Votre clé API" style="width:100%; padding:0.5rem; margin-bottom:1rem;" />
  <button id="analyzeBtn">Analyser les cotes</button>
  <div id="debugArea" style="display:none;">
    <h3>Cotes triées par position</h3>
    <div id="cotesDebug" class="debug"></div>
  </div>
  <table id="resultTable">
    <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th></tr></thead>
    <tbody></tbody>
  </table>
  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">📋 Copier</button>
    <button id="csvBtn">📥 CSV</button>
  </div>

  <script>
    const OFFICIAL_CLUBS = [
      "Manchester Red", "Everton",
      "Leeds", "London Blues",
      "Burnley", "Fulham",
      "Brentford", "West Ham",
      "Newcastle", "Sunderland",
      "Liverpool", "Brighton",
      "Spurs", "A. Villa",
      "N. Forest", "Wolverhampton",
      "Manchester Blue", "Bournemouth",
      "C. Palace", "London Reds"
    ];

    const cotesInput = document.getElementById('cotesInput');
    const apiKeyInput = document.getElementById('apiKey');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const debugArea = document.getElementById('debugArea');
    const cotesDebug = document.getElementById('cotesDebug');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    const actionsDiv = document.getElementById('actions');

    async function ocrSpaceWithCoords(file, apiKey) {
      const form = new FormData();
      form.append('apikey', apiKey);
      form.append('file', file, 'image.png');
      form.append('language', 'fre');
      form.append('OCREngine', 2);
      form.append('isTable', 'true');  // demande la détection de tableau
      const res = await fetch('https://api.ocr.space/parse/image', {
        method: 'POST',
        body: form
      });
      const data = await res.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage || 'Erreur OCR');
      return data;
    }

    function extractOddsFromOcrResult(ocrData) {
      const parsedResults = ocrData.ParsedResults?.[0];
      if (!parsedResults) return [];

      const textOverlay = parsedResults.TextOverlay;
      if (!textOverlay || !textOverlay.Lines) {
        // Fallback : utiliser le texte brut
        const text = parsedResults.ParsedText;
        const numbers = text.match(/\d+[.,]\d+/g) || [];
        const relevant = numbers.map(n => n.replace(',', '.')).slice(0, 30);
        if (relevant.length < 30) return [];
        const col1 = relevant.slice(0, 10);
        const colN = relevant.slice(10, 20);
        const col2 = relevant.slice(20, 30);
        return OFFICIAL_CLUBS.reduce((acc, _, i, arr) => {
          if (i % 2 === 0) acc.push({ team1: arr[i], team2: arr[i+1], homeOdd: col1[i/2], drawOdd: colN[i/2], awayOdd: col2[i/2] });
          return acc;
        }, []);
      }

      // Exploiter les coordonnées des lignes
      const allWords = [];
      for (const line of textOverlay.Lines) {
        for (const word of line.Words) {
          // Ne garder que les mots qui sont des nombres décimaux
          if (/^\d+[.,]\d+$/.test(word.WordText)) {
            allWords.push({
              text: word.WordText.replace(',', '.'),
              x: word.Left,
              y: word.Top
            });
          }
        }
      }

      // On ne garde que les nombres situés en dessous du repère "1" (ou après les équipes)
      // Trouver le Y moyen après les équipes (par ex. y > 200)
      const thresholdY = 200; // à ajuster selon la capture
      const cotesWords = allWords.filter(w => w.y > thresholdY);

      // Trier par Y puis par X pour avoir les lignes de cotes (de gauche à droite, de haut en bas)
      cotesWords.sort((a, b) => a.y - b.y || a.x - b.x);

      // Regrouper par lignes (même Y approximatif, tolérance 10 pixels)
      const rows = [];
      let currentRow = [];
      let currentY = -1;
      for (const w of cotesWords) {
        if (currentY === -1 || Math.abs(w.y - currentY) <= 10) {
          currentRow.push(w.text);
          currentY = w.y;
        } else {
          if (currentRow.length) rows.push(currentRow);
          currentRow = [w.text];
          currentY = w.y;
        }
      }
      if (currentRow.length) rows.push(currentRow);

      // Normalement, on obtient 10 lignes de 3 cotes.
      const matches = [];
      for (let i = 0; i < rows.length && i < 10; i++) {
        const row = rows[i];
        if (row.length >= 3) {
          matches.push({
            team1: OFFICIAL_CLUBS[i*2],
            team2: OFFICIAL_CLUBS[i*2 + 1],
            homeOdd: row[0],
            drawOdd: row[1],
            awayOdd: row[2]
          });
        }
      }

      // Si on n'a pas 10 matchs, fallback sur la méthode simple
      if (matches.length < 10) {
        const numbers = cotesWords.map(w => w.text).slice(0, 30);
        const col1 = numbers.slice(0, 10);
        const colN = numbers.slice(10, 20);
        const col2 = numbers.slice(20, 30);
        return OFFICIAL_CLUBS.reduce((acc, _, i, arr) => {
          if (i % 2 === 0) acc.push({ team1: arr[i], team2: arr[i+1], homeOdd: col1[i/2], drawOdd: colN[i/2], awayOdd: col2[i/2] });
          return acc;
        }, []);
      }

      return matches;
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!cotesInput.files[0]) return alert('Choisissez l\'image des cotes');
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return alert('Entrez votre clé API OCR.space');

      analyzeBtn.disabled = true;
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
      actionsDiv.style.display = 'none';

      try {
        const ocrData = await ocrSpaceWithCoords(cotesInput.files[0], apiKey);
        const matches = extractOddsFromOcrResult(ocrData);

        cotesDebug.textContent = JSON.stringify(matches.map(m => ({ t1: m.team1, t2: m.team2, o: [m.homeOdd, m.drawOdd, m.awayOdd] })), null, 2);
        debugArea.style.display = 'block';

        tbody.innerHTML = '';
        matches.forEach(m => {
          const h = parseFloat(m.homeOdd), d = parseFloat(m.drawOdd), a = parseFloat(m.awayOdd);
          let sum12 = '–', sum1N2 = '–', moy = '–';
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            sum12 = (h + a).toFixed(2);
            sum1N2 = (h + d + a).toFixed(2);
            moy = ((h + d + a) / 3).toFixed(2);
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td><td>${m.homeOdd}</td><td>${m.drawOdd}</td><td>${m.awayOdd}</td><td>${sum12}</td><td>${sum1N2}</td><td>${moy}</td>`;
          tbody.appendChild(tr);
        });
        resultTable.style.display = 'table';
        actionsDiv.style.display = 'flex';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    // Boutons copier/CSV inchangés...
    document.getElementById('copyBtn').onclick = () => { /* ... */ };
    document.getElementById('csvBtn').onclick = () => { /* ... */ };
  </script>
</body>
</html>
