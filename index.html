<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finoana Auto Claim</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

  <script>
    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAuuM8srnQNvYHJG5vMFfJQq-MwpU2H0Po",
      authDomain: "finoana-autoclaim.firebaseapp.com",
      projectId: "finoana-autoclaim",
      storageBucket: "finoana-autoclaim.firebasestorage.app",
      messagingSenderId: "873516238295",
      appId: "1:873516238295:web:ab78797587d0f300173792",
      measurementId: "G-51QDS362WW"
    };

    // Initialiser Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: #e6f7ff;
    }

    h1 {
      color: #333;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    input {
      padding: 12px;
      margin: 10px 0;
      width: 260px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 12px 25px;
      margin: 10px 5px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login {
      background: #28a745;
      color: white;
    }

    .login:hover {
      background: #218838;
    }

    .signup {
      background: #fd7e14;
      color: white;
    }

    .signup:hover {
      background: #e36a00;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      left: 10px;
    }

    .footer a {
      color: blue;
      margin-right: 15px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Finoana Auto Claim</h1>
  <p>Bienvenue sur <b>Finoana Auto Claim</b> ! Connectez-vous pour commencer à gagner vos TRX automatiquement.</p>

  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Mot de passe"><br><br>

  <button class="login" onclick="login()">Se connecter</button>
  <button class="signup" onclick="signup()">Créer un compte</button>

  <div class="footer">
    <a href="#">FAQ</a>
    <a href="#">Contact</a>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Veuillez entrer votre email et mot de passe.");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          // Login réussi
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }

    function signup() {
      window.location.href = "signup.html";
    }
  </script>

</body>
</html>
