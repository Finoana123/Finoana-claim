<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Fusion finale</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.8rem 1.5rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; display: none; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <h1>⚽ Bet261 – Fusion finale</h1>
  <p>1. Chargez la capture des <strong>cotes</strong></p>
  <input type="file" id="cotesInput" accept="image/*" />
  <p>2. Chargez la capture des <strong>résultats</strong></p>
  <input type="file" id="resultatsInput" accept="image/*" />
  <p>3. Clé API OCR.space</p>
  <input type="text" id="apiKey" placeholder="Votre clé API" style="width:100%; padding:0.5rem; margin-bottom:1rem;" />
  <button id="analyzeBtn">Analyser</button>
  <div id="debugArea" style="display:none;">
    <h3>Texte brut cotes</h3>
    <div id="cotesDebug" class="debug"></div>
    <h3>Texte brut résultats</h3>
    <div id="resultatsDebug" class="debug"></div>
  </div>
  <table id="resultTable">
    <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th><th>Résultat</th></tr></thead>
    <tbody></tbody>
  </table>
  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">📋 Copier</button>
    <button id="csvBtn">📥 CSV</button>
  </div>

  <script>
    const cotesInput = document.getElementById('cotesInput');
    const resultatsInput = document.getElementById('resultatsInput');
    const apiKeyInput = document.getElementById('apiKey');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const debugArea = document.getElementById('debugArea');
    const cotesDebug = document.getElementById('cotesDebug');
    const resultatsDebug = document.getElementById('resultatsDebug');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    const actionsDiv = document.getElementById('actions');

    // OCR.space
    async function ocrSpace(file, apiKey) {
      const form = new FormData();
      form.append('apikey', apiKey);
      form.append('file', file, 'image.png');
      form.append('language', 'fre');
      form.append('OCREngine', 2);
      const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: form });
      const data = await res.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage || 'Erreur OCR');
      return data.ParsedResults?.[0]?.ParsedText || '';
    }

    // Nettoyage noms
    const STOP_WORDS = new Set(['se','connecter','inscrire','s\'inscrire','menu','virtuel','mes','paris','bonus','jouer','comporte','risques','restons','vigilants','bet','261','1x2','mi-tps','double','chance','dc','p','i','xv','yv','size']);
    function cleanName(str) {
      let cleaned = str.replace(/[^A-Za-z À-ÿ'-]/g, ' ').trim();
      let tokens = cleaned.split(/\s+/).filter(w => w.length >= 2 && !STOP_WORDS.has(w.toLowerCase()));
      tokens = tokens.filter(t => /^[A-Z]/.test(t));
      return tokens.join(' ');
    }
    const normalize = s => s.toLowerCase().replace(/[^a-z]/g, '');

    // Extraction des paires et des résultats depuis le texte résultats
    function extractResults(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const pairs = [];
      const results = {};
      // On cherche une ligne qui contient un score, puis on capture l'équipe à gauche et l'équipe en dessous ou à droite
      // Format: "Manchester Red 2:1 Everton" ou "Manchester Red\n2:1\nEverton"
      for (let i = 0; i < lines.length; i++) {
        // Chercher un score dans la ligne
        const scoreMatch = lines[i].match(/(\d+)\s*[-:]\s*(\d+)/);
        if (scoreMatch) {
          const score = scoreMatch[1] + '-' + scoreMatch[2];
          // Chercher l'équipe 1 au-dessus (ligne précédente)
          let team1 = '', team2 = '';
          for (let j = i-1; j >= 0; j--) {
            const candidate = cleanName(lines[j]);
            if (candidate) { team1 = candidate; break; }
          }
          // Chercher l'équipe 2 en dessous
          for (let j = i+1; j < lines.length; j++) {
            const candidate = cleanName(lines[j]);
            if (candidate) { team2 = candidate; break; }
          }
          if (team1 && team2) {
            pairs.push({ team1, team2 });
            results[normalize(team1)] = score;
            results[normalize(team2)] = score;
            // Passer les lignes déjà traitées
            i += 2;
          }
        }
      }
      return { pairs, results };
    }

    // Extraction des cotes : on prend les équipes dans l'ordre, on les met par paires, puis on associe les cotes dans l'ordre
    function extractOdds(text, pairs) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      // Extraire toutes les cotes dans l'ordre
      const allOdds = [];
      for (const line of lines) {
        const nums = line.match(/\d+[.,]\d+/g);
        if (nums) allOdds.push(...nums.map(n => n.replace(',', '.')));
      }
      
      // Extraire les noms d'équipes dans l'ordre depuis le texte des cotes
      const teamList = [];
      for (const line of lines) {
        const name = cleanName(line);
        if (name && !/\d+[.,]\d+/.test(line) && !STOP_WORDS.has(name.toLowerCase())) {
          teamList.push(name);
        }
      }

      // Construire les paires d'équipes à partir de cette liste (deux consécutives)
      const cotesPairs = [];
      for (let i = 0; i < teamList.length - 1; i += 2) {
        cotesPairs.push({ team1: teamList[i], team2: teamList[i+1] });
      }

      // Maintenant, associer chaque paire à 3 cotes (ou 2)
      const matches = [];
      let oddIdx = 0;
      for (const pair of cotesPairs) {
        if (oddIdx >= allOdds.length) break;
        const home = allOdds[oddIdx];
        const draw = (oddIdx + 2 < allOdds.length) ? allOdds[oddIdx + 1] : null;
        const away = draw ? allOdds[oddIdx + 2] : allOdds[oddIdx + 1];
        matches.push({
          team1: pair.team1,
          team2: pair.team2,
          homeOdd: home,
          drawOdd: draw,
          awayOdd: away
        });
        oddIdx += draw ? 3 : 2;
      }
      return matches;
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!cotesInput.files[0] || !resultatsInput.files[0]) return alert('Choisissez les deux images');
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return alert('Entrez votre clé API OCR.space');

      analyzeBtn.disabled = true;
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
      actionsDiv.style.display = 'none';

      try {
        const [cotesText, resultatsText] = await Promise.all([
          ocrSpace(cotesInput.files[0], apiKey),
          ocrSpace(resultatsInput.files[0], apiKey)
        ]);

        cotesDebug.textContent = cotesText || '(vide)';
        resultatsDebug.textContent = resultatsText || '(vide)';
        debugArea.style.display = 'block';

        const { pairs: resultPairs, results } = extractResults(resultatsText);
        const matches = extractOdds(cotesText, resultPairs);

        // Fusion avec les résultats
        matches.forEach(m => {
          const key1 = normalize(m.team1);
          const key2 = normalize(m.team2);
          m.result = results[key1] || results[key2] || '–';
          const h = parseFloat(m.homeOdd);
          const d = parseFloat(m.drawOdd);
          const a = parseFloat(m.awayOdd);
          if (!isNaN(h) && !isNaN(a)) {
            m.sum12 = (h + a).toFixed(2);
            m.sum1N2 = !isNaN(d) ? (h + d + a).toFixed(2) : '–';
            m.mean = !isNaN(d) ? ((h + d + a) / 3).toFixed(2) : '–';
          } else {
            m.sum12 = m.sum1N2 = m.mean = '–';
          }
        });

        tbody.innerHTML = '';
        matches.forEach(m => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td>
            <td>${m.homeOdd || '–'}</td><td>${m.drawOdd || '–'}</td><td>${m.awayOdd || '–'}</td>
            <td>${m.sum12}</td><td>${m.sum1N2}</td><td>${m.mean}</td><td>${m.result}</td>`;
          tbody.appendChild(tr);
        });
        resultTable.style.display = 'table';
        actionsDiv.style.display = 'flex';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    // Copier / CSV
    document.getElementById('copyBtn').onclick = () => {
      const lines = [...tbody.querySelectorAll('tr')].map(tr =>
        [...tr.querySelectorAll('td')].map(td => td.textContent).join('\t')
      ).join('\n');
      navigator.clipboard.writeText(lines).then(() => alert('Copié !'));
    };
    document.getElementById('csvBtn').onclick = () => {
      let csv = 'Équipe 1,Équipe 2,1,N,2,Somme 1+2,Somme 1+N+2,Moyenne,Résultat\n';
      [...tbody.querySelectorAll('tr')].forEach(tr => {
        const tds = [...tr.querySelectorAll('td')].map(td => td.textContent);
        csv += tds.map(v => `"${v}"`).join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'matchs.csv';
      a.click();
    };
  </script>
</body>
</html>
