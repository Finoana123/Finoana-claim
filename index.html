<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Étape 1 : Cotes uniquement</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.8rem 1.5rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; display: none; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <h1>⚽ Bet261 – Étape 1 : Cotes</h1>
  <p>Chargez la capture des <strong>cotes</strong> (avant match).</p>
  <input type="file" id="cotesInput" accept="image/*" />
  <p>Clé API OCR.space</p>
  <input type="text" id="apiKey" placeholder="Votre clé API" style="width:100%; padding:0.5rem; margin-bottom:1rem;" />
  <button id="analyzeBtn">Analyser les cotes</button>
  <div id="debugArea" style="display:none;">
    <h3>Texte brut cotes</h3>
    <div id="cotesDebug" class="debug"></div>
  </div>
  <table id="resultTable">
    <thead>
      <tr>
        <th>Équipe 1</th><th>Équipe 2</th>
        <th>1</th><th>N</th><th>2</th>
        <th>S 1+2</th><th>S 1+N+2</th><th>Moy</th><th>Résultat</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">📋 Copier</button>
    <button id="csvBtn">📥 CSV</button>
  </div>

  <script>
    const cotesInput = document.getElementById('cotesInput');
    const apiKeyInput = document.getElementById('apiKey');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const debugArea = document.getElementById('debugArea');
    const cotesDebug = document.getElementById('cotesDebug');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    const actionsDiv = document.getElementById('actions');

    // OCR via OCR.space
    async function ocrSpace(file, apiKey) {
      const form = new FormData();
      form.append('apikey', apiKey);
      form.append('file', file, 'image.png');
      form.append('language', 'fre');
      form.append('OCREngine', 2);
      const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: form });
      const data = await res.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage || 'Erreur OCR');
      return data.ParsedResults?.[0]?.ParsedText || '';
    }

    // STOP WORDS
    const STOP_WORDS = new Set([
      'se', 'connecter', 'inscrire', 's\'inscrire', 'menu', 'virtuel', 'mes', 'paris',
      'bonus', 'jouer', 'comporte', 'risques', 'restons', 'vigilants', 'bet', '261',
      '1', '2', 'x', '1x2', 'mi-tps', 'double', 'chance', 'dc',
      'attention', 'journée', 'aujourd\'hui', 'english', 'league', 'résultats', 'matchs',
      'classement', 'mt', 'all', 'hall', '4g+', 'trail', 'o', 'v', '|'
    ]);

    // Nettoyage nom d'équipe
    function cleanName(str) {
      let cleaned = str.replace(/[^A-Za-zÀ-ÿ .'-]/g, ' ').trim();
      let tokens = cleaned.split(/\s+/).filter(w => {
        const lower = w.toLowerCase();
        return !STOP_WORDS.has(lower) && /[A-Za-z]/.test(w);
      });
      tokens = tokens.map(t => t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
      return tokens.join(' ').trim();
    }

    // Extraction des cotes : on lit les équipes dans l'ordre, puis on associe les cotes trois par trois
    function extractOdds(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const teamSequence = [];
      const pureNumbers = [];

      for (const line of lines) {
        const name = cleanName(line);
        const numbers = line.match(/\d+[.,]\d+/g);
        if (numbers) {
          pureNumbers.push(...numbers.map(n => n.replace(',', '.')));
        }
        if (name && !numbers) {
          teamSequence.push(name);
        }
      }

      // Regrouper les équipes deux par deux
      const pairs = [];
      for (let i = 0; i < teamSequence.length - 1; i += 2) {
        pairs.push({ team1: teamSequence[i], team2: teamSequence[i+1] });
      }

      // Les cotes sont toujours groupées par 3 sur la capture : 1, N, 2
      const matches = [];
      let oddIdx = 0;
      for (const pair of pairs) {
        if (oddIdx + 2 >= pureNumbers.length) break;
        matches.push({
          team1: pair.team1,
          team2: pair.team2,
          homeOdd: pureNumbers[oddIdx],
          drawOdd: pureNumbers[oddIdx+1],
          awayOdd: pureNumbers[oddIdx+2]
        });
        oddIdx += 3;
      }
      return matches;
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!cotesInput.files[0]) return alert('Choisissez l\'image des cotes');
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return alert('Entrez votre clé API OCR.space');

      analyzeBtn.disabled = true;
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
      actionsDiv.style.display = 'none';

      try {
        const cotesText = await ocrSpace(cotesInput.files[0], apiKey);
        cotesDebug.textContent = cotesText || '(vide)';
        debugArea.style.display = 'block';

        const matches = extractOdds(cotesText);

        tbody.innerHTML = '';
        matches.forEach(m => {
          // Calculer sommes et moyenne
          const h = parseFloat(m.homeOdd);
          const d = parseFloat(m.drawOdd);
          const a = parseFloat(m.awayOdd);
          let sum12 = '–', sum1N2 = '–', moy = '–';
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            sum12 = (h + a).toFixed(2);
            sum1N2 = (h + d + a).toFixed(2);
            moy = ((h + d + a) / 3).toFixed(2);
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td>
            <td>${m.homeOdd}</td><td>${m.drawOdd}</td><td>${m.awayOdd}</td>
            <td>${sum12}</td><td>${sum1N2}</td><td>${moy}</td><td>–</td>`;
          tbody.appendChild(tr);
        });
        resultTable.style.display = 'table';
        actionsDiv.style.display = 'flex';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    // Copier / CSV
    document.getElementById('copyBtn').onclick = () => {
      const rows = [...tbody.querySelectorAll('tr')];
      const text = rows.map(r => [...r.querySelectorAll('td')].map(d => d.textContent).join('\t')).join('\n');
      navigator.clipboard.writeText(text).then(() => alert('Copié !'));
    };
    document.getElementById('csvBtn').onclick = () => {
      let csv = 'Équipe 1,Équipe 2,1,N,2,Somme 1+2,Somme 1+N+2,Moyenne,Résultat\n';
      [...tbody.querySelectorAll('tr')].forEach(r => {
        const tds = [...r.querySelectorAll('td')].map(d => d.textContent);
        csv += tds.map(v => `"${v}"`).join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cotes.csv';
      a.click();
    };
  </script>
</body>
</html>
