<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Fusion fiable</title>
  <style>
    :root {
      --primary: #1a73e8;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --border: #dadce0;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      margin: 0; padding: 2rem 1rem;
      display: flex; justify-content: center;
      color: var(--text);
    }
    .container { max-width: 900px; width: 100%; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-weight: 400; font-size: 2rem; margin: 0 0 0.5rem; }
    .header p { color: #5f6368; }
    .upload-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .upload-card {
      flex: 1 1 250px; background: var(--card-bg);
      border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .upload-area {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 1.5rem; text-align: center; cursor: pointer;
    }
    .upload-area:hover { border-color: var(--primary); background: #f1f5ff; }
    .upload-area input { display: none; }
    .btn {
      display: inline-block; padding: 0.6rem 1.5rem;
      background: var(--primary); color: white; border: none;
      border-radius: 6px; font-size: 1rem; cursor: pointer;
      margin-top: 1rem; transition: 0.2s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      background: white; color: var(--primary); border: 1px solid var(--primary);
    }
    .result-card {
      background: var(--card-bg); border-radius: 12px;
      padding: 1.5rem; margin-top: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: none;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.3rem; border-bottom: 1px solid var(--border); }
    th { font-weight: 500; color: #5f6368; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
    .debug { background: #f4f4f4; padding: 1rem; margin-top: 1rem; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    .error { color: #d93025; background: #fce8e6; padding: 1rem; border-radius: 8px; }
    .spinner {
      display: inline-block; width: 1rem; height: 1rem;
      border: 2px solid #ccc; border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ Bet261 – Fusion fiable</h1>
      <p>Sélectionnez les deux captures, le tableau complet apparaîtra.</p>
    </div>

    <div class="upload-row">
      <div class="upload-card">
        <h3>1. Capture des cotes</h3>
        <div class="upload-area" id="oddsArea">
          <p>📷 Matchs avec cotes</p>
          <input type="file" id="oddsInput" accept="image/*">
        </div>
      </div>
      <div class="upload-card">
        <h3>2. Capture des résultats</h3>
        <div class="upload-area" id="resultsArea">
          <p>📷 Scores après matchs</p>
          <input type="file" id="resultsInput" accept="image/*">
        </div>
      </div>
    </div>

    <button class="btn" id="analyzeBtn" disabled>Analyser et fusionner</button>
    <div id="status"></div>

    <div id="debugArea" style="display:none;">
      <h3>OCR brut – Cotes</h3>
      <div id="oddsDebug" class="debug"></div>
      <h3>OCR brut – Résultats</h3>
      <div id="resultsDebug" class="debug"></div>
    </div>

    <div class="result-card" id="resultCard">
      <h2>Tableau complet</h2>
      <div style="overflow-x: auto;">
        <table id="matchTable">
          <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th><th>Résultat</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="actions">
        <button class="btn btn-outline" id="copyBtn">📋 Copier</button>
        <button class="btn btn-outline" id="csvBtn">📥 CSV</button>
      </div>
    </div>
  </div>

  <script src='https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js'></script>
  <script>
    // Éléments du DOM (identiques à avant)
    const oddsInput = document.getElementById('oddsInput');
    const resultsInput = document.getElementById('resultsInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultCard = document.getElementById('resultCard');
    const tbody = document.querySelector('#matchTable tbody');
    const statusDiv = document.getElementById('status');
    const debugArea = document.getElementById('debugArea');
    const oddsDebug = document.getElementById('oddsDebug');
    const resultsDebug = document.getElementById('resultsDebug');
    const oddsArea = document.getElementById('oddsArea');
    const resultsArea = document.getElementById('resultsArea');
    let oddsFile = null, resultsFile = null;

    oddsArea.onclick = () => oddsInput.click();
    resultsArea.onclick = () => resultsInput.click();
    oddsInput.onchange = () => { oddsFile = oddsInput.files[0]; checkFiles(); };
    resultsInput.onchange = () => { resultsFile = resultsInput.files[0]; checkFiles(); };
    function checkFiles() { analyzeBtn.disabled = !(oddsFile && resultsFile); }

    // Nettoyage des noms d'équipes
    function cleanTeamName(str) {
      // Supprime les symboles isolés mais garde les lettres, chiffres, points, espaces, tirets
      let name = str.replace(/[^A-Za-z0-9 .'-]/g, '').trim();
      // Supprime les mots courts (<2 lettres) isolés (restes de bruit)
      name = name.split(' ').filter(w => w.length >= 2 || /\d/.test(w)).join(' ');
      return name.trim();
    }

    // Normalisation pour la fusion
    const normalize = s => s.toLowerCase().replace(/[^a-z]/g, '');

    // Extraction robuste des cotes
    function extractOdds(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      const matches = [];
      const oddRegex = /(\d+[.,]\d+)/g;
      let i = 0;
      while (i < lines.length - 1) {
        // Essayer de nettoyer la ligne courante
        let line1 = cleanTeamName(lines[i]);
        let line2 = cleanTeamName(lines[i+1]);
        // Vérifier que ce sont des mots (lettres) et pas seulement des nombres/cotes
        if (/[A-Za-z]/.test(line1) && /[A-Za-z]/.test(line2) && line1.length > 1 && line2.length > 1) {
          // Vérifier que la ligne suivante n'est pas une cote (nombre décimal)
          if (!/^\d+[.,]\d+$/.test(lines[i]) && !/^\d+[.,]\d+$/.test(lines[i+1])) {
            // Chercher les cotes dans les 3 lignes suivantes
            let odds = [];
            for (let j = i+2; j < Math.min(i+6, lines.length); j++) {
              const nums = lines[j].match(oddRegex);
              if (nums) odds.push(...nums.map(n => n.replace(',', '.')));
              if (odds.length >= 3) break;
            }
            if (odds.length >= 2) {
              let homeOdd = odds[0];
              let drawOdd = odds.length === 3 ? odds[1] : null;
              let awayOdd = odds.length === 3 ? odds[2] : odds[1];
              matches.push({
                team1: line1, team2: line2,
                homeOdd: homeOdd || null,
                drawOdd: drawOdd || null,
                awayOdd: awayOdd || null
              });
              i += 2; // passer les deux équipes
              continue;
            }
          }
        }
        i++;
      }
      return matches;
    }

    // Extraction robuste des résultats (gère les motifs [score] et (score])
    function extractResults(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      const results = {};
      // Pattern 1 : "Team1 [score] Team2" ou "Team1 (score] Team2" ou "Team1 [score) Team2"
      const pattern1 = /^[^a-zA-Z]*([A-Za-z .'-]+?)\s*[\[\(]\s*(\d+)\s*[-:]\s*(\d+)\s*[\]\)]\s+([A-Za-z .'-]+)/;
      // Pattern 2 : "Team1 score Team2" (sans crochets)
      const pattern2 = /^[^a-zA-Z]*([A-Za-z .'-]+?)\s+(\d+)\s*[-:]\s*(\d+)\s+([A-Za-z .'-]+)/;
      for (const line of lines) {
        // Nettoyer un peu la ligne
        const cleanLine = line.replace(/[|\[\]\(\)]/g, ' ').trim();
        // Essayer pattern1
        let m = line.match(pattern1);
        if (m) {
          const team1 = cleanTeamName(m[1]);
          const score = `${m[2]}-${m[3]}`;
          const team2 = cleanTeamName(m[4]);
          results[normalize(team1)] = score;
          results[normalize(team2)] = score;
          continue;
        }
        // Essayer pattern2
        m = cleanLine.match(pattern2);
        if (m) {
          const team1 = cleanTeamName(m[1]);
          const score = `${m[2]}-${m[3]}`;
          const team2 = cleanTeamName(m[4]);
          results[normalize(team1)] = score;
          results[normalize(team2)] = score;
        }
      }
      return results;
    }

    analyzeBtn.onclick = async () => {
      analyzeBtn.disabled = true;
      statusDiv.innerHTML = '<span class="spinner"></span> OCR en cours...';
      resultCard.style.display = 'none';
      debugArea.style.display = 'none';

      try {
        const [oddsRes, resultsRes] = await Promise.all([
          Tesseract.recognize(oddsFile, 'eng', { tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK }),
          Tesseract.recognize(resultsFile, 'eng', { tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK })
        ]);

        const oddsText = oddsRes.data.text;
        const resultsText = resultsRes.data.text;
        oddsDebug.textContent = oddsText;
        resultsDebug.textContent = resultsText;
        debugArea.style.display = 'block';

        const matches = extractOdds(oddsText);
        const results = extractResults(resultsText);

        // Fusion et calculs (identique à avant)
        matches.forEach(m => {
          const key1 = normalize(m.team1);
          const key2 = normalize(m.team2);
          m.result = results[key1] || results[key2] || '–';
          const h = parseFloat(m.homeOdd);
          const d = parseFloat(m.drawOdd);
          const a = parseFloat(m.awayOdd);
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            m.sum12 = (h + a).toFixed(2);
            m.sum1N2 = (h + d + a).toFixed(2);
            m.mean = ((h + d + a) / 3).toFixed(2);
          } else if (!isNaN(h) && !isNaN(a) && isNaN(d)) {
            m.sum12 = (h + a).toFixed(2);
            m.sum1N2 = '–';
            m.mean = '–';
          } else {
            m.sum12 = '–'; m.sum1N2 = '–'; m.mean = '–';
          }
        });

        // Rendu du tableau
        tbody.innerHTML = '';
        matches.forEach(m => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td>
            <td>${m.homeOdd||'–'}</td><td>${m.drawOdd||'–'}</td><td>${m.awayOdd||'–'}</td>
            <td>${m.sum12}</td><td>${m.sum1N2}</td><td>${m.mean}</td><td>${m.result}</td>`;
          tbody.appendChild(tr);
        });
        resultCard.style.display = 'block';
        statusDiv.innerHTML = '';
        window._matches = matches;
      } catch (err) {
        statusDiv.innerHTML = `<div class="error">❌ ${err.message}</div>`;
      } finally {
        analyzeBtn.disabled = false;
      }
    };

    // Boutons copier / CSV (inchangés)
    document.getElementById('copyBtn').onclick = () => {
      if (!window._matches) return;
      const lines = window._matches.map(m =>
        `${m.team1}\t${m.team2}\t${m.homeOdd||'-'}\t${m.drawOdd||'-'}\t${m.awayOdd||'-'}\t${m.sum12||'-'}\t${m.sum1N2||'-'}\t${m.mean||'-'}\t${m.result||'-'}`
      ).join('\n');
      navigator.clipboard.writeText(lines).then(() => alert('Tableau copié !'));
    };
    document.getElementById('csvBtn').onclick = () => {
      if (!window._matches) return;
      let csv = 'Équipe 1,Équipe 2,1,N,2,Somme 1+2,Somme 1+N+2,Moyenne,Résultat\n';
      window._matches.forEach(m => {
        csv += `"${m.team1}","${m.team2}",${m.homeOdd||''},${m.drawOdd||''},${m.awayOdd||''},${m.sum12||''},${m.sum1N2||''},${m.mean||''},"${m.result||''}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'matchs_fusion.csv';
      a.click();
    };
  </script>
</body>
</html>
