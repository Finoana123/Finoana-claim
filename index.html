<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – 10 matchs par colonnes X</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.8rem 1.5rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; display: none; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <h1>⚽ Bet261 – 10 matchs (par X)</h1>
  <p>Chargez la capture des <strong>cotes</strong></p>
  <input type="file" id="cotesInput" accept="image/*" />
  <p>Clé API OCR.space</p>
  <input type="text" id="apiKey" placeholder="Votre clé API" style="width:100%; padding:0.5rem; margin-bottom:1rem;" />
  <button id="analyzeBtn">Analyser</button>
  <div id="debugArea" style="display:none;">
    <h3>Colonnes trouvées</h3>
    <div id="colsDebug" class="debug"></div>
    <h3>Cotes triées par colonne</h3>
    <div id="oddsDebug" class="debug"></div>
  </div>
  <table id="resultTable">
    <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th></tr></thead>
    <tbody></tbody>
  </table>
  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">📋 Copier</button>
    <button id="csvBtn">📥 CSV</button>
  </div>

  <script>
    const OFFICIAL_CLUBS = [
      "Manchester Red", "Everton",
      "Leeds", "London Blues",
      "Burnley", "Fulham",
      "Brentford", "West Ham",
      "Newcastle", "Sunderland",
      "Liverpool", "Brighton",
      "Spurs", "A. Villa",
      "N. Forest", "Wolverhampton",
      "Manchester Blue", "Bournemouth",
      "C. Palace", "London Reds"
    ];

    const cotesInput = document.getElementById('cotesInput');
    const apiKeyInput = document.getElementById('apiKey');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const debugArea = document.getElementById('debugArea');
    const colsDebug = document.getElementById('colsDebug');
    const oddsDebug = document.getElementById('oddsDebug');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    const actionsDiv = document.getElementById('actions');

    async function ocrSpaceWithCoords(file, apiKey) {
      const form = new FormData();
      form.append('apikey', apiKey);
      form.append('file', file, 'image.png');
      form.append('language', 'fre');
      form.append('OCREngine', 2);
      form.append('isTable', 'true');
      const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: form });
      const data = await res.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage || 'Erreur OCR');
      return data;
    }

    function extractMatches(ocrData) {
      const textOverlay = ocrData.ParsedResults?.[0]?.TextOverlay;
      if (!textOverlay || !textOverlay.Lines) throw new Error('Pas de données de position');

      // Récupérer tous les mots
      const allWords = [];
      for (const line of textOverlay.Lines) {
        for (const word of line.Words) {
          allWords.push({
            text: word.WordText,
            x: word.Left,
            y: word.Top
          });
        }
      }

      // Chercher le repère "1" (en-tête de colonne)
      let foundMarker = false;
      const oddEntries = [];
      for (const w of allWords) {
        if (!foundMarker) {
          if (w.text === '1' || w.text === '1.0' || w.text === '1,0') {
            foundMarker = true;
          }
          continue;
        }
        // Après le marqueur, on enregistre tous les nombres décimaux
        if (/^\d+[.,]\d+$/.test(w.text)) {
          oddEntries.push({
            value: parseFloat(w.text.replace(',', '.')),
            x: w.x,
            y: w.y
          });
        }
      }

      if (oddEntries.length < 30) throw new Error('Pas assez de cotes trouvées après le marqueur');

      // ----- Séparer en 3 colonnes selon X -----
      // On trie les cotes par X pour trouver les clusters
      const sortedByX = [...oddEntries].sort((a, b) => a.x - b.x);
      // Calculer les gaps pour déterminer les séparations entre colonnes
      const gaps = [];
      for (let i = 1; i < sortedByX.length; i++) {
        gaps.push({ gap: sortedByX[i].x - sortedByX[i-1].x, index: i });
      }
      // Prendre les deux plus grands écarts comme séparateurs de colonnes
      gaps.sort((a, b) => b.gap - a.gap);
      const splitIdx1 = Math.min(gaps[0].index, gaps[1].index);
      const splitIdx2 = Math.max(gaps[0].index, gaps[1].index);

      // Diviser en 3 groupes
      const col1 = sortedByX.slice(0, splitIdx1);
      const colN = sortedByX.slice(splitIdx1, splitIdx2);
      const col2 = sortedByX.slice(splitIdx2);

      // Trier chaque colonne par Y (de haut en bas)
      col1.sort((a, b) => a.y - b.y);
      colN.sort((a, b) => a.y - b.y);
      col2.sort((a, b) => a.y - b.y);

      // Débogage
      colsDebug.textContent = `Colonne 1 : ${col1.length} cotes\nColonne N : ${colN.length} cotes\nColonne 2 : ${col2.length} cotes`;
      oddsDebug.textContent = 
        "Colonne 1 (Y) : " + col1.map(o => o.value.toFixed(2)).join(', ') + "\n" +
        "Colonne N (Y) : " + colN.map(o => o.value.toFixed(2)).join(', ') + "\n" +
        "Colonne 2 (Y) : " + col2.map(o => o.value.toFixed(2)).join(', ');

      // Garder les 10 premières valeurs de chaque colonne
      const col1Top = col1.slice(0, 10).map(o => o.value.toFixed(2));
      const colNTop = colN.slice(0, 10).map(o => o.value.toFixed(2));
      const col2Top = col2.slice(0, 10).map(o => o.value.toFixed(2));

      if (col1Top.length < 10 || colNTop.length < 10 || col2Top.length < 10) {
        throw new Error('Nombre de cotes insuffisant dans au moins une colonne');
      }

      // Assembler les matchs avec la liste officielle
      const matches = [];
      for (let i = 0; i < 10; i++) {
        matches.push({
          team1: OFFICIAL_CLUBS[i*2],
          team2: OFFICIAL_CLUBS[i*2 + 1],
          homeOdd: col1Top[i],
          drawOdd: colNTop[i],
          awayOdd: col2Top[i]
        });
      }
      return matches;
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!cotesInput.files[0]) return alert('Choisissez l\'image des cotes');
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return alert('Entrez votre clé API OCR.space');

      analyzeBtn.disabled = true;
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
      actionsDiv.style.display = 'none';

      try {
        const ocrData = await ocrSpaceWithCoords(cotesInput.files[0], apiKey);
        const matches = extractMatches(ocrData);

        tbody.innerHTML = '';
        matches.forEach(m => {
          const h = parseFloat(m.homeOdd), d = parseFloat(m.drawOdd), a = parseFloat(m.awayOdd);
          let sum12 = '–', sum1N2 = '–', moy = '–';
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            sum12 = (h + a).toFixed(2);
            sum1N2 = (h + d + a).toFixed(2);
            moy = ((h + d + a) / 3).toFixed(2);
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td><td>${m.homeOdd}</td><td>${m.drawOdd}</td><td>${m.awayOdd}</td><td>${sum12}</td><td>${sum1N2}</td><td>${moy}</td>`;
          tbody.appendChild(tr);
        });
        resultTable.style.display = 'table';
        actionsDiv.style.display = 'flex';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    // Boutons copier/CSV (inchangés)
    document.getElementById('copyBtn').onclick = () => { /* ... */ };
    document.getElementById('csvBtn').onclick = () => { /* ... */ };
  </script>
</body>
</html>
