<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – Fusion automatique (ordre indifférent)</title>
  <style>
    :root {
      --primary: #1a73e8;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --border: #dadce0;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      margin: 0; padding: 2rem 1rem;
      display: flex; justify-content: center;
      color: var(--text);
    }
    .container { max-width: 900px; width: 100%; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-weight: 400; font-size: 2rem; margin: 0 0 0.5rem; }
    .header p { color: #5f6368; }
    .upload-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .upload-card {
      flex: 1 1 250px; background: var(--card-bg);
      border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .upload-area {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 1.5rem; text-align: center; cursor: pointer;
    }
    .upload-area:hover { border-color: var(--primary); background: #f1f5ff; }
    .upload-area input { display: none; }
    .btn {
      display: inline-block; padding: 0.6rem 1.5rem;
      background: var(--primary); color: white; border: none;
      border-radius: 6px; font-size: 1rem; cursor: pointer;
      margin-top: 1rem; transition: 0.2s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      background: white; color: var(--primary); border: 1px solid var(--primary);
    }
    .result-card {
      background: var(--card-bg); border-radius: 12px;
      padding: 1.5rem; margin-top: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: none;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.3rem; border-bottom: 1px solid var(--border); }
    th { font-weight: 500; color: #5f6368; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
    .debug { background: #f4f4f4; padding: 1rem; margin-top: 1rem; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    .error { color: #d93025; background: #fce8e6; padding: 1rem; border-radius: 8px; }
    .spinner {
      display: inline-block; width: 1rem; height: 1rem;
      border: 2px solid #ccc; border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ Bet261 – Fusion automatique</h1>
      <p>Sélectionnez les deux captures (peu importe l'ordre).</p>
    </div>

    <div class="upload-row">
      <div class="upload-card">
        <h3>Image 1</h3>
        <div class="upload-area" id="area1">
          <p>📷 Première capture</p>
          <input type="file" id="input1" accept="image/*">
        </div>
      </div>
      <div class="upload-card">
        <h3>Image 2</h3>
        <div class="upload-area" id="area2">
          <p>📷 Seconde capture</p>
          <input type="file" id="input2" accept="image/*">
        </div>
      </div>
    </div>

    <button class="btn" id="analyzeBtn" disabled>Analyser et fusionner</button>
    <div id="status"></div>

    <div id="debugArea" style="display:none;">
      <h3>Texte brut 1</h3>
      <div id="debug1" class="debug"></div>
      <h3>Texte brut 2</h3>
      <div id="debug2" class="debug"></div>
    </div>

    <div class="result-card" id="resultCard">
      <h2>Tableau complet</h2>
      <div style="overflow-x: auto;">
        <table id="matchTable">
          <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th><th>Résultat</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="actions">
        <button class="btn btn-outline" id="copyBtn">📋 Copier</button>
        <button class="btn btn-outline" id="csvBtn">📥 CSV</button>
      </div>
    </div>
  </div>

  <script src='https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js'></script>
  <script>
    const input1 = document.getElementById('input1');
    const input2 = document.getElementById('input2');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultCard = document.getElementById('resultCard');
    const tbody = document.querySelector('#matchTable tbody');
    const statusDiv = document.getElementById('status');
    const debugArea = document.getElementById('debugArea');
    const debug1 = document.getElementById('debug1');
    const debug2 = document.getElementById('debug2');
    const area1 = document.getElementById('area1');
    const area2 = document.getElementById('area2');
    let file1 = null, file2 = null;

    area1.onclick = () => input1.click();
    area2.onclick = () => input2.click();
    input1.onchange = () => { file1 = input1.files[0]; checkFiles(); };
    input2.onchange = () => { file2 = input2.files[0]; checkFiles(); };
    function checkFiles() { analyzeBtn.disabled = !(file1 && file2); }

    // Nettoyage d'un nom d'équipe
    function cleanName(str) {
      return str.replace(/[^A-Za-z '-]/g, ' ').split(/\s+/).filter(w => w.length >= 2).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ').trim();
    }

    const normalize = s => s.toLowerCase().replace(/[^a-z]/g, '');

    // Extraction des résultats (à partir du texte qui contient "Résultats" ou des scores)
    function extractResults(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const results = {};
      for (const line of lines) {
        // Chercher "Team (score] Team" ou "Team [score] Team" ou "Team score Team"
        let m = line.match(/^[^a-zA-Z]*([A-Za-z .'-]+?)\s*[\[\(]\s*(\d+)\s*[-:]\s*(\d+)\s*[\]\)]\s+([A-Za-z .'-]+)/);
        if (!m) {
          m = line.match(/^[^a-zA-Z]*([A-Za-z .'-]+?)\s+(\d+)\s*[-:]\s*(\d+)\s+([A-Za-z .'-]+)/);
        }
        if (m) {
          const team1 = cleanName(m[1]);
          const score = `${m[2]}-${m[3]}`;
          const team2 = cleanName(m[4]);
          if (team1 && team2) {
            results[normalize(team1)] = score;
            results[normalize(team2)] = score;
          }
        }
      }
      return results;
    }

    // Extraction des cotes guidée par la liste des équipes connues (extraite des résultats)
    function extractOddsGuided(text, knownTeams) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const matches = [];
      const oddRegex = /\d+[.,]\d+/g;
      // Repérer toutes les lignes qui ressemblent à un nom d'équipe connu
      const positions = [];
      for (let i = 0; i < lines.length; i++) {
        const cleaned = cleanName(lines[i]);
        if (cleaned && knownTeams.has(normalize(cleaned))) {
          positions.push({ index: i, name: cleaned });
        }
      }
      // Parcourir les paires d'équipes successives dans le fichier
      for (let i = 0; i < positions.length - 1; i++) {
        const a = positions[i];
        const b = positions[i+1];
        // Vérifier que les deux équipes ne sont pas trop éloignées (moins de 5 lignes)
        if (b.index - a.index <= 5) {
          // Chercher les cotes entre a.index+1 et b.index+2
          let odds = [];
          for (let j = a.index + 1; j <= Math.min(b.index + 2, lines.length - 1); j++) {
            const nums = lines[j].match(oddRegex);
            if (nums) odds.push(...nums.map(n => n.replace(',', '.')));
          }
          if (odds.length >= 2) {
            const homeOdd = odds[0] || null;
            const drawOdd = odds.length === 3 ? odds[1] : null;
            const awayOdd = odds.length === 3 ? odds[2] : odds[1];
            matches.push({ team1: a.name, team2: b.name, homeOdd, drawOdd, awayOdd });
          }
        }
      }
      return matches;
    }

    analyzeBtn.onclick = async () => {
      analyzeBtn.disabled = true;
      statusDiv.innerHTML = '<span class="spinner"></span> OCR en cours...';
      resultCard.style.display = 'none';
      debugArea.style.display = 'none';

      try {
        const [res1, res2] = await Promise.all([
          Tesseract.recognize(file1, 'eng', { tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK }),
          Tesseract.recognize(file2, 'eng', { tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK })
        ]);

        const text1 = res1.data.text;
        const text2 = res2.data.text;
        debug1.textContent = text1;
        debug2.textContent = text2;
        debugArea.style.display = 'block';

        // Déterminer automatiquement quel texte est celui des résultats et lequel celui des cotes
        let resultsText, oddsText;
        if (text1.includes('Résultats') && !text1.includes('1 X 2')) {
          resultsText = text1;
          oddsText = text2;
        } else if (text2.includes('Résultats') && !text2.includes('1 X 2')) {
          resultsText = text2;
          oddsText = text1;
        } else {
          // Fallback : celui qui contient le plus de scores
          const scores1 = (text1.match(/\d+\s*[-:]\s*\d+/g) || []).length;
          const scores2 = (text2.match(/\d+\s*[-:]\s*\d+/g) || []).length;
          if (scores1 > scores2) {
            resultsText = text1; oddsText = text2;
          } else {
            resultsText = text2; oddsText = text1;
          }
        }

        const results = extractResults(resultsText);
        const teamNames = new Set(Object.keys(results));
        const matches = extractOddsGuided(oddsText, teamNames);

        // Fusion et calculs
        matches.forEach(m => {
          const key1 = normalize(m.team1);
          const key2 = normalize(m.team2);
          m.result = results[key1] || results[key2] || '–';
          const h = parseFloat(m.homeOdd);
          const d = parseFloat(m.drawOdd);
          const a = parseFloat(m.awayOdd);
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            m.sum12 = (h + a).toFixed(2);
            m.sum1N2 = (h + d + a).toFixed(2);
            m.mean = ((h + d + a) / 3).toFixed(2);
          } else if (!isNaN(h) && !isNaN(a) && isNaN(d)) {
            m.sum12 = (h + a).toFixed(2);
            m.sum1N2 = '–';
            m.mean = '–';
          } else {
            m.sum12 = '–'; m.sum1N2 = '–'; m.mean = '–';
          }
        });

        // Rendu
        tbody.innerHTML = '';
        matches.forEach(m => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td>
            <td>${m.homeOdd||'–'}</td><td>${m.drawOdd||'–'}</td><td>${m.awayOdd||'–'}</td>
            <td>${m.sum12}</td><td>${m.sum1N2}</td><td>${m.mean}</td><td>${m.result}</td>`;
          tbody.appendChild(tr);
        });
        resultCard.style.display = 'block';
        statusDiv.innerHTML = '';
        window._matches = matches;
      } catch (err) {
        statusDiv.innerHTML = `<div class="error">❌ ${err.message}</div>`;
      } finally {
        analyzeBtn.disabled = false;
      }
    };

    document.getElementById('copyBtn').onclick = () => {
      if (!window._matches) return;
      const lines = window._matches.map(m =>
        `${m.team1}\t${m.team2}\t${m.homeOdd||'-'}\t${m.drawOdd||'-'}\t${m.awayOdd||'-'}\t${m.sum12||'-'}\t${m.sum1N2||'-'}\t${m.mean||'-'}\t${m.result||'-'}`
      ).join('\n');
      navigator.clipboard.writeText(lines).then(() => alert('Tableau copié !'));
    };
    document.getElementById('csvBtn').onclick = () => {
      if (!window._matches) return;
      let csv = 'Équipe 1,Équipe 2,1,N,2,Somme 1+2,Somme 1+N+2,Moyenne,Résultat\n';
      window._matches.forEach(m => {
        csv += `"${m.team1}","${m.team2}",${m.homeOdd||''},${m.drawOdd||''},${m.awayOdd||''},${m.sum12||''},${m.sum1N2||''},${m.mean||''},"${m.result||''}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'matchs_fusion.csv';
      a.click();
    };
  </script>
</body>
</html>
