<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finoana Auto Claim - Connexion</title>

<!-- Firebase v9+ compat CDN -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuuM8srnQNvYHJG5vMFfJQq-MwpU2H0Po",
  authDomain: "finoana-autoclaim.firebaseapp.com",
  projectId: "finoana-autoclaim",
  storageBucket: "finoana-autoclaim.firebasestorage.app",
  messagingSenderId: "873516238295",
  appId: "1:873516238295:web:ab78797587d0f300173792"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Veuillez entrer votre email et mot de passe");
    return;
  }

  auth.signInWithEmailAndPassword(email,password)
    .then(userCredential => {
      const user = userCredential.user;

      // Vérifier si le nom est enregistré dans la base
      db.ref("users/" + user.uid).once("value", snapshot => {
        if(snapshot.exists()){
          localStorage.setItem("loggedUser", JSON.stringify(snapshot.val()));
          window.location.href = "dashboard.html";
        } else {
          alert("Erreur : utilisateur non trouvé dans la base.");
        }
      });
    })
    .catch(error => alert(error.message));
}
</script>

<style>
body{ font-family:Arial; text-align:center; margin-top:80px; background:#e6f7ff;}
h1{ color:#333; }
input{ padding:12px; margin:10px; width:260px; border-radius:5px; border:1px solid #ccc;}
button{ padding:12px 25px; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;}
button:hover{ background:#218838; }
.signup{ background:#fd7e14; }
.signup:hover{ background:#e36a00; }
a{text-decoration:none; color:#007bff; font-weight:bold;}
.footer{ position:fixed; bottom:10px; left:10px;}
.footer a{ margin-right:15px; }
</style>

</head>
<body>

<h1>Finoana Auto Claim</h1>
<p>Connectez-vous pour commencer à gagner vos TRX</p>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Connexion</button>
<button class="signup" onclick="window.location.href='signup.html'">S'inscrire</button>

<div class="footer">
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

</body>
</html>
