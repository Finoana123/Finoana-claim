<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extraction des cotes – Bet261</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    .upload-area { border: 2px dashed #aaa; padding: 2rem; text-align: center; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Extraction des cotes (image 1)</h2>
  <div class="upload-area" id="uploadArea">
    <p>📷 Cliquez ou déposez la capture des cotes</p>
    <input type="file" id="fileInput" accept="image/*" hidden>
  </div>
  <button id="analyzeBtn" disabled>Analyser</button>
  <div id="status"></div>

  <div id="debugArea" style="display:none;">
    <h3>OCR brut</h3>
    <div id="ocrText" class="debug"></div>
  </div>

  <table id="resultTable" style="display:none;">
    <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th></tr></thead>
    <tbody></tbody>
  </table>

  <script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusDiv = document.getElementById('status');
    const debugArea = document.getElementById('debugArea');
    const ocrTextDiv = document.getElementById('ocrText');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    let selectedFile = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#1a73e8'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#aaa');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.borderColor = '#aaa';
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        handleFile(fileInput.files[0]);
      }
    });
    fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

    function handleFile(file) {
      selectedFile = file;
      analyzeBtn.disabled = false;
      statusDiv.innerHTML = '';
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
    }

    // ---------- STOP WORDS ----------
    const STOP_WORDS = new Set([
      'se', 'connecter', 'inscrire', 's\'inscrire',
      'menu', 'virtuel', 'mes', 'paris',
      'bonus', 'jouer', 'comporte', 'risques',
      'restons', 'vigilants', 'bet', '261',
      '1x2', 'mi-tps', 'double', 'chance', 'dc'
    ]);

    // ---------- NETTOYAGE RENFORCE ----------
    function cleanName(str) {
      // Supprime tout sauf les lettres (avec accents), espaces, apostrophes, tirets
      let cleaned = str.replace(/[^A-Za-z À-ÿ'-]/g, ' ').trim();
      // Sépare en mots
      let tokens = cleaned.split(/\s+/).filter(w => w.length >= 2 && !STOP_WORDS.has(w.toLowerCase()));
      if (tokens.length === 0) return '';
      // Ne garder que les tokens commençant par une majuscule (comme les vrais noms d'équipe)
      tokens = tokens.filter(t => /^[A-Z]/.test(t));
      return tokens.join(' ');
    }

    // ---------- EXTRACTION DES COTES ----------
    function extractOdds(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const matches = [];
      const numberLines = [];
      // Repérer toutes les lignes qui contiennent un nombre décimal
      lines.forEach((line, idx) => {
        const nums = line.match(/\d+[.,]\d+/g);
        if (nums) numberLines.push({ idx, nums: nums.map(n => n.replace(',', '.')) });
      });

      // Grouper les lignes de nombres proches (écart ≤ 2 lignes)
      const groups = [];
      for (const item of numberLines) {
        if (groups.length === 0 || item.idx - groups[groups.length-1].at(-1).idx > 2) {
          groups.push([item]);
        } else {
          groups[groups.length-1].push(item);
        }
      }

      for (const group of groups) {
        const allOdds = group.flatMap(g => g.nums);
        const odds = allOdds.slice(0, 3);
        if (odds.length < 2) continue;

        const firstIdx = group[0].idx;
        const teamLines = [];
        // Chercher deux équipes valides au‑dessus du premier nombre
        for (let j = firstIdx - 1; j >= 0 && teamLines.length < 2; j--) {
          const raw = lines[j];
          // Ignorer les lignes qui sont elles‑mêmes des nombres ou des minutes
          if (/^\d+[.,]\d+$/.test(raw) || /^\d+'/.test(raw)) continue;
          const name = cleanName(raw);
          if (name) teamLines.unshift(name);
        }
        // Si on n'en a pas deux, chercher en dessous
        if (teamLines.length < 2) {
          for (let j = firstIdx + 1; j < lines.length && teamLines.length < 2; j++) {
            const raw = lines[j];
            if (/^\d+[.,]\d+$/.test(raw) || /^\d+'/.test(raw)) continue;
            const name = cleanName(raw);
            if (name) {
              teamLines.push(name);
              if (teamLines.length === 2) break;
            }
          }
        }

        if (teamLines.length >= 2) {
          matches.push({
            team1: teamLines[0],
            team2: teamLines[1],
            homeOdd: odds[0] || null,
            drawOdd: odds.length === 3 ? odds[1] : null,
            awayOdd: odds.length === 3 ? odds[2] : odds[1]
          });
        }
      }
      return matches;
    }

    // ---------- ANALYSE ----------
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      analyzeBtn.disabled = true;
      statusDiv.innerHTML = '<span style="color:#1a73e8;">OCR en cours...</span>';
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';

      try {
        // Prétraitement (noir & blanc)
        const preprocessed = await preprocessImage(selectedFile);
        // Lancer Tesseract sur l'image prétraitée
        const { data } = await Tesseract.recognize(preprocessed, 'eng', {
          tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK
        });
        const ocrText = data.text;

        // Afficher le texte brut pour debug
        ocrTextDiv.textContent = ocrText;
        debugArea.style.display = 'block';

        const matches = extractOdds(ocrText);
        tbody.innerHTML = '';
        if (matches.length > 0) {
          matches.forEach(m => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td>
              <td>${m.homeOdd || '–'}</td><td>${m.drawOdd || '–'}</td><td>${m.awayOdd || '–'}</td>`;
            tbody.appendChild(tr);
          });
          resultTable.style.display = 'table';
          statusDiv.innerHTML = '';
        } else {
          statusDiv.innerHTML = '<span style="color:red;">Aucune cote trouvée.</span>';
        }
      } catch (err) {
        statusDiv.innerHTML = `<span style="color:red;">❌ Erreur : ${err.message}</span>`;
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    // ---------- PRETRAITEMENT ----------
    function preprocessImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            const val = gray > 128 ? 255 : 0;
            data[i] = val;
            data[i+1] = val;
            data[i+2] = val;
          }
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL('image/png'));
        };
        img.src = URL.createObjectURL(file);
      });
    }
  </script>
</body>
</html>
