<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet261 – 10 matchs complets</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.8rem 1.5rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; display: none; }
    th, td { border: 1px solid #ddd; padding: 0.4rem; text-align: left; }
    .debug { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <h1>⚽ Bet261 – 10 matchs complets</h1>
  <p>Chargez la capture des <strong>cotes</strong></p>
  <input type="file" id="cotesInput" accept="image/*" />
  <p>Clé API OCR.space</p>
  <input type="text" id="apiKey" placeholder="Votre clé API" style="width:100%; padding:0.5rem; margin-bottom:1rem;" />
  <button id="analyzeBtn">Analyser</button>
  <div id="debugArea" style="display:none;">
    <h3>Équipes (Y)</h3>
    <div id="teamsDebug" class="debug"></div>
    <h3>Cotes (Y)</h3>
    <div id="oddsDebug" class="debug"></div>
  </div>
  <table id="resultTable">
    <thead><tr><th>Équipe 1</th><th>Équipe 2</th><th>1</th><th>N</th><th>2</th><th>S 1+2</th><th>S 1+N+2</th><th>Moy</th></tr></thead>
    <tbody></tbody>
  </table>
  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">📋 Copier</button>
    <button id="csvBtn">📥 CSV</button>
  </div>

  <script>
    // Liste officielle des 20 clubs (10 paires)
    const OFFICIAL_CLUBS = [
      "Manchester Red", "Everton",
      "Leeds", "London Blues",
      "Burnley", "Fulham",
      "Brentford", "West Ham",
      "Newcastle", "Sunderland",
      "Liverpool", "Brighton",
      "Spurs", "A. Villa",
      "N. Forest", "Wolverhampton",
      "Manchester Blue", "Bournemouth",
      "C. Palace", "London Reds"
    ];

    const cotesInput = document.getElementById('cotesInput');
    const apiKeyInput = document.getElementById('apiKey');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const debugArea = document.getElementById('debugArea');
    const teamsDebug = document.getElementById('teamsDebug');
    const oddsDebug = document.getElementById('oddsDebug');
    const resultTable = document.getElementById('resultTable');
    const tbody = resultTable.querySelector('tbody');
    const actionsDiv = document.getElementById('actions');

    // OCR avec coordonnées
    async function ocrSpaceWithCoords(file, apiKey) {
      const form = new FormData();
      form.append('apikey', apiKey);
      form.append('file', file, 'image.png');
      form.append('language', 'fre');
      form.append('OCREngine', 2);
      form.append('isTable', 'true');
      const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: form });
      const data = await res.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage || 'Erreur OCR');
      return data;
    }

    // Normalisation pour comparaison des noms
    function normalize(s) {
      return s.toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function extractMatches(ocrData) {
      const textOverlay = ocrData.ParsedResults?.[0]?.TextOverlay;
      if (!textOverlay || !textOverlay.Lines) throw new Error('Pas de données de position');

      // Extraire tous les mots
      const allWords = [];
      for (const line of textOverlay.Lines) {
        for (const word of line.Words) {
          allWords.push({
            text: word.WordText,
            x: word.Left,
            y: word.Top,
            width: word.Width,
            height: word.Height
          });
        }
      }

      // ----- Étape 1 : repérer les équipes -----
      const teamEntries = [];
      for (const club of OFFICIAL_CLUBS) {
        const normClub = normalize(club);
        let bestMatch = null;
        let bestScore = 0;
        for (const w of allWords) {
          const normWord = normalize(w.text);
          if (normWord.includes(normClub) || normClub.includes(normWord)) {
            const score = Math.min(normWord.length, normClub.length);
            if (score > bestScore) {
              bestScore = score;
              bestMatch = w;
            }
          }
        }
        if (bestMatch) teamEntries.push({ club, y: bestMatch.y });
      }

      // Trier les équipes par position Y (de haut en bas)
      teamEntries.sort((a, b) => a.y - b.y);
      teamsDebug.textContent = teamEntries.map(t => `${t.club} → Y=${t.y}`).join('\n');

      // ----- Étape 2 : repérer les cotes (nombres décimaux) -----
      const oddEntries = [];
      for (const w of allWords) {
        if (/^\d+[.,]\d+$/.test(w.text)) {
          oddEntries.push({
            value: parseFloat(w.text.replace(',', '.')),
            y: w.y,
            x: w.x
          });
        }
      }
      oddEntries.sort((a, b) => a.y - b.y);
      oddsDebug.textContent = oddEntries.map(o => `${o.value.toFixed(2)} → Y=${o.y}`).join('\n');

      // ----- Étape 3 : associer cotes aux paires -----
      const matches = [];
      // On parcourt les équipes par paires (0-1, 2-3, ...)
      for (let i = 0; i < teamEntries.length; i += 2) {
        if (i + 1 >= teamEntries.length) break;
        const team1 = teamEntries[i];
        const team2 = teamEntries[i+1];

        // Définir la zone Y du match : du bas de la 2e équipe jusqu'à la 1ère équipe suivante (ou fin)
        const yStart = team2.y;                       // juste après la 2e équipe
        const yEnd = (i + 2 < teamEntries.length) ? teamEntries[i+2].y : 9999;  // avant la prochaine équipe

        // Chercher les cotes dans cette zone
        const pairOdds = oddEntries.filter(o => o.y >= yStart && o.y < yEnd);
        // Trier par X pour obtenir l'ordre 1, N, 2
        pairOdds.sort((a, b) => a.x - b.x);

        if (pairOdds.length >= 3) {
          matches.push({
            team1: team1.club,
            team2: team2.club,
            homeOdd: pairOdds[0].value.toFixed(2),
            drawOdd: pairOdds[1].value.toFixed(2),
            awayOdd: pairOdds[2].value.toFixed(2)
          });
        }
      }

      return matches;
    }

    analyzeBtn.addEventListener('click', async () => {
      if (!cotesInput.files[0]) return alert('Choisissez l\'image des cotes');
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return alert('Entrez votre clé API OCR.space');

      analyzeBtn.disabled = true;
      debugArea.style.display = 'none';
      resultTable.style.display = 'none';
      actionsDiv.style.display = 'none';

      try {
        const ocrData = await ocrSpaceWithCoords(cotesInput.files[0], apiKey);
        const matches = extractMatches(ocrData);

        tbody.innerHTML = '';
        matches.forEach(m => {
          const h = parseFloat(m.homeOdd), d = parseFloat(m.drawOdd), a = parseFloat(m.awayOdd);
          let sum12 = '–', sum1N2 = '–', moy = '–';
          if (!isNaN(h) && !isNaN(d) && !isNaN(a)) {
            sum12 = (h + a).toFixed(2);
            sum1N2 = (h + d + a).toFixed(2);
            moy = ((h + d + a) / 3).toFixed(2);
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${m.team1}</td><td>${m.team2}</td><td>${m.homeOdd}</td><td>${m.drawOdd}</td><td>${m.awayOdd}</td><td>${sum12}</td><td>${sum1N2}</td><td>${moy}</td>`;
          tbody.appendChild(tr);
        });
        resultTable.style.display = 'table';
        actionsDiv.style.display = 'flex';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    // Boutons copier/CSV (inchangés)
    document.getElementById('copyBtn').onclick = () => { /* ... */ };
    document.getElementById('csvBtn').onclick = () => { /* ... */ };
  </script>
</body>
</html>
